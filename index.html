/* ===== 렌더링 ===== */
function counts(color){
  var b=game.board(), c={p:0,n:0,b:0,r:0,q:0};
  for(var r=0;r<8;r++) for(var f=0;f<8;f++){ var s=b[r][f]; if(s&&s.color===color&&c[s.type]!==undefined) c[s.type]++; }
  return c;
}
function trayHTML(color,init){
  var c=counts(color), order=["q","r","b","n","p"], html="";
  for(var i=0;i<order.length;i++){
    var t=order[i], lost=init[t]-c[t];
    for(var k=0;k<lost;k++) html+='<span class="g '+color+'">'+GLY[t]+'</span>';
  }
  return html;
}
function material(color){ var c=counts(color); return c.p*1+c.n*3+c.b*3+c.r*5+c.q*9; }

function render(){
  var b=game.board(), board=document.getElementById("board");
  var rows=(playerColor==="w")?[0,1,2,3,4,5,6,7]:[7,6,5,4,3,2,1,0];
  var cols=(playerColor==="w")?[0,1,2,3,4,5,6,7]:[7,6,5,4,3,2,1,0];
  var checkSq=null;
  if(game.in_check()){
    var who=game.turn();
    for(var rr=0;rr<8;rr++) for(var ff=0;ff<8;ff++){ var p=b[rr][ff]; if(p&&p.type==="k"&&p.color===who) checkSq=FILES[ff]+(8-rr); }
  }
  // 복기 중이면 마지막 수 칸을 일반 하이라이트 대신 그 수의 평가 라벨 색으로(§CSS .sq.q-*)
  var reviewTierClass=null;
  if(reviewIndex>=0 && lastAnalysis && lastAnalysis.results[reviewIndex]) reviewTierClass="q-"+lastAnalysis.results[reviewIndex].label;
  var html="";
  for(var ri=0;ri<8;ri++){ var r=rows[ri];
    for(var ci=0;ci<8;ci++){ var c=cols[ci];
      var sqName=FILES[c]+(8-r), piece=b[r][c];
      var dark=((r+c)%2===1);
      var cls="sq "+(dark?"d":"l");
      if(selected===sqName) cls+=" sel";
      if(lastMove&&(lastMove.from===sqName||lastMove.to===sqName)) cls+= reviewTierClass?(" "+reviewTierClass):" last";
      if(checkSq===sqName) cls+=" chk";
      var isTarget=targets.indexOf(sqName)>=0;
      if(isTarget) cls+= piece?" cap":"";
      html+='<div class="'+cls+'" data-square="'+sqName+'">';
      if(isTarget) html+='<span class="dot"></span>';
      if(ci===0) html+='<span class="co r">'+(8-r)+'</span>';
      if(ri===7) html+='<span class="co f">'+FILES[c]+'</span>';
      if(piece) html+='<span class="pc '+piece.color+'">'+GLY[piece.type]+'</span>';
      html+='</div>';
    }
  }
  board.innerHTML=html;

  // 트레이 + 물질
  var oppC=playerColor==="w"?"b":"w";
  document.getElementById("trayTop").innerHTML=trayHTML(oppC,{p:8,n:2,b:2,r:2,q:1}); // 내가 잡은 상대 기물
  document.getElementById("trayBot").innerHTML=trayHTML(playerColor,{p:8,n:2,b:2,r:2,q:1});
  var diff=material(playerColor)-material(oppC);
  document.getElementById("matTop").textContent=opp.name+" (상대)";
  document.getElementById("matBot").innerHTML = diff===0 ? "동률" : (diff>0?("나 우세 <b>+"+diff+"</b>"):("상대 우세 <b>+"+(-diff)+"</b>"));
  fitBoard();
  renderPostGameBar();
  renderMoveLog();
}

function sanPieceType(san){
  var c=san.charAt(0);
  if(c==="O") return "k";
  if(c==="N") return "n"; if(c==="B") return "b"; if(c==="R") return "r";
  if(c==="Q") return "q"; if(c==="K") return "k";
  return "p";
}
function sanWithGlyph(san,white){
  var gly=(white?WGLY:GLY)[sanPieceType(san)];
  return gly+san;
}
/* 분석 결과가 있으면(results!=null) 그 ply의 라벨 기호를 SAN 옆에 붙이고 클릭 시 그 수로 복기 이동 */
function mlCell(san,white,ply,results){
  var tag="";
  if(results && results[ply] && results[ply].label){
    var r=results[ply];
    tag=' <span class="mlTag t-'+r.label+'" onclick="event.stopPropagation();gotoPly('+ply+')" title="'+(r.symbol||'')+'">'+(r.symbol||'·')+'</span>';
  }
  return '<span class="'+(white?"mlW":"mlB")+'">'+sanWithGlyph(san,white)+tag+'</span>';
}
function renderMoveLog(){
  var el=document.getElementById("moveLog");
  // 복기 모드에선 game이 중간 위치로 load()되어 있을 수 있어(history()가 비어짐), lastAnalysis.results를
  // 기보의 출처로 우선 사용 — 그래야 전체 수순이 계속 온전하게 보인다.
  var results=(lastAnalysis && lastAnalysis.results && lastAnalysis.results.length)?lastAnalysis.results:null;
  var h=results?results.map(function(r){return r.san;}):(game?game.history():[]);
  if(h.length===0){ el.innerHTML='<div class="mlEmpty">아직 둔 수가 없습니다.</div>'; return; }
  var html="";
  for(var i=0;i<h.length;i+=2){
    var cur=(reviewIndex===i||reviewIndex===i+1);
    html+='<div class="mlRow'+(cur?" cur":"")+'"><span class="mlNum">'+(i/2+1)+'.</span>'+
      mlCell(h[i],true,i,results)+
      (h[i+1]!==undefined ? mlCell(h[i+1],false,i+1,results) : '<span class="mlB"></span>')+
      '</div>';
  }
  el.innerHTML=html;
  // 스크롤은 #moveLog 자신이 아니라 부모인 #sheetBody가 담당(중첩 스크롤 없이 시트 전체가 하나로 스크롤)
  var sheetBody=document.getElementById("sheetBody");
  if(reviewIndex<0){ if(sheetBody) sheetBody.scrollTop=sheetBody.scrollHeight; }
  else { var curEl=el.querySelector(".mlRow.cur"); if(curEl) curEl.scrollIntoView({block:"nearest"}); }
}

function setStatus(txt,cls){
  var el=document.getElementById("status");
  el.textContent=txt; el.className=cls||"";
}
function turnText(){ return game.turn()===playerColor ? "당신 차례입니다." : (opp.name+"의 차례."); }

/* ===== 진행 ===== */
function postMove(mv,byPlayer){
  playMoveSound();
  lastMove={from:mv.from,to:mv.to}; selected=null; targets=[]; render();
  var over=game.game_over();
  if(byPlayer){
    if(over){ if(game.in_checkmate()) speak("checkmate_lose"); endGame(); return; }
    if(mv.san.indexOf("+")>=0) speak("check_received");
    else if(mv.captured) speak("got_captured");
    triggerBotMove();
  } else {
    var ctx="normal";
    if(mv.san.indexOf("#")>=0) ctx="checkmate_win";
    else if(mv.san.indexOf("+")>=0) ctx="check";
    else if(mv.flags.indexOf("k")>=0||mv.flags.indexOf("q")>=0) ctx="castle";
    else if(mv.flags.indexOf("p")>=0) ctx="promote";
    else if(mv.captured) ctx="capture";
    else {
      var oppC=playerColor==="w"?"b":"w";
      var adv=(oppC==="w"?evaluate():-evaluate());
      if(adv>350 && Math.random()<0.5) ctx="winning";
      else if(adv<-350 && Math.random()<0.5) ctx="losing";
    }
    if(!(ctx==="normal" && Math.random()<0.45)) speak(ctx);
    if(over){ endGame(); return; }
    setStatus(turnText(),"");
  }
}

function triggerBotMove(){
  setStatus(opp.name+" 생각 중…","think");
  thinking=true;
  var thinkStart=Date.now(), targetDelay=humanDelay();
  // 15ms 지연으로 브라우저가 '생각 중' 말풍선을 먼저 그리게 한 뒤, 무거운 탐색을 시작
  setTimeout(function(){ scheduleBotMove(thinkStart,targetDelay); },15);
}
function scheduleBotMove(thinkStart,targetDelay){
  if(game.game_over()){ thinking=false; endGame(); return; }
  // 탐색(evalAllMoves)이 워커에서 도는 동안 메인 스레드는 자유롭다 — 사람처럼 보이도록,
  // 결과가 오면 목표 '생각 시간'만큼 채워서 대기한 뒤에야 착수를 화면에 반영(reveal).
  function reveal(mv){
    if(!mv){ var l=game.moves({verbose:true}); mv=l[0]; }
    var remain=Math.max(0, targetDelay-(Date.now()-thinkStart));
    setTimeout(function(){ finalizeBotMove(mv); },remain);
  }
  try{ chooseMoveAsync(opp, reveal); }
  catch(e){ reveal(null); }
}
function finalizeBotMove(mv){
  thinking=false;
  var done=game.move({from:mv.from,to:mv.to,promotion:mv.promotion||"q"});
  postMove(done,false);
}

function endGame(){
  gameOver=true;
  if(game.in_checkmate()){
    var loser=game.turn(); // 메이트 당한 쪽
    if(loser===playerColor) setStatus("체크메이트 — "+opp.name+"의 승리.","lose");
    else setStatus("체크메이트 — 당신의 승리!","win");
  } else if(game.in_stalemate()){ setStatus("스테일메이트 — 무승부.","");
  } else if(game.insufficient_material()){ setStatus("기물 부족 — 무승부.","");
  } else if(game.in_threefold_repetition()){ setStatus("3회 동형 반복 — 무승부.","");
  } else if(game.in_draw()){ setStatus("50수 규칙 — 무승부.","");
  } else { setStatus("대국 종료.",""); }
  if(game.history().length>0){ currentGameId=saveGameRecord(); }
  renderPostGameBar();
}

/* ===== 하단 시트 그립 — 탭 또는 위/아래 스와이프로 접힘·펼침 토글 =====
   포인터 이벤트라 터치/마우스 공용. 드래그 추종 없이, 놓았을 때 이동 거리만 보고 방향(또는
   탭)을 판정하는 가벼운 방식 — 리스트 안 버튼 클릭과 충돌하지 않도록 그립 영역에만 건다. */
(function(){
  var sh=document.getElementById("sheetHandle");
  if(!sh) return;
  var startY=null;
  sh.addEventListener("pointerdown", function(ev){ startY=ev.clientY; });
  sh.addEventListener("pointerup", function(ev){
    if(startY===null) return;
    var dy=ev.clientY-startY; startY=null;
    if(Math.abs(dy)<8) toggleSheet();
    else if(dy<-10) setSheetExpanded(true);
    else if(dy>10) setSheetExpanded(false);
  });
  sh.addEventListener("pointercancel", function(){ startY=null; });
})();

/* ===== 입력 ===== */
document.getElementById("board").addEventListener("click",function(ev){
  if(!game||gameOver||thinking||interviewActive) return;
  if(game.turn()!==playerColor) return;
  var cell=ev.target.closest("[data-square]"); if(!cell) return;
  var sq=cell.getAttribute("data-square");

  if(selected && targets.indexOf(sq)>=0){
    var opts=game.moves({square:selected,verbose:true}).filter(function(m){return m.to===sq;});
    if(opts.length && opts[0].flags.indexOf("p")>=0){ askPromo(selected,sq); return; }
    var mv=game.move({from:selected,to:sq});
    if(mv) postMove(mv,true);
    return;
  }
  var b=game.board(), r=8-parseInt(sq[1],10), f=sq.charCodeAt(0)-97, pc=b[r][f];
  if(pc && pc.color===playerColor){
    selected=sq;
    targets=game.moves({square:sq,verbose:true}).map(function(m){return m.to;});
    render();
  } else { selected=null; targets=[]; render(); }
});

function askPromo(from,to){
  pendingPromo={from:from,to:to};
  var row=document.getElementById("promoRow"); row.innerHTML="";
  ["q","r","b","n"].forEach(function(t){
    var btn=document.createElement("button");
    btn.innerHTML='<span class="pc '+playerColor+'">'+GLY[t]+'</span>';
    btn.onclick=function(){ doPromo(t); };
    row.appendChild(btn);
  });
  document.getElementById("scrim").classList.add("show");
}
function doPromo(t){
  document.getElementById("scrim").classList.remove("show");
  if(!pendingPromo) return;
  var mv=game.move({from:pendingPromo.from,to:pendingPromo.to,promotion:t});
  pendingPromo=null;
  if(mv) postMove(mv,true);
}

function undoMove(){
  if(thinking||analyzing||reviewIndex>=0||!game) return;
  var h=game.history();
  if(h.length===0) return;
  // 봇 수 + 내 수 되돌리기 (내가 다시 둘 차례가 되도록)
  game.undo();
  if(game.history().length>0 && game.turn()!==playerColor) game.undo();
  gameOver=false; selected=null; targets=[];
  lastMove=null;
  render(); setStatus(turnText(),"");
}

/* 기권 — 진행 중인 대국을 즉시 패배로 종료. endGame()과 달리 chess.js 자체의 game_over 판정이
   아니라 사용자가 강제로 끝내는 것이므로 resultDetail을 "resign"으로 별도 기록한다. */
function resignGame(){
  if(!game || gameOver || thinking || analyzing || reviewIndex>=0) return;
  if(game.history().length===0) return; // 한 수도 안 뒀으면 기권할 게 없음
  gameOver=true; selected=null; targets=[];
  setStatus("기권 — "+opp.name+"의 승리.","lose");
  speak("checkmate_lose");
  currentGameId=saveGameRecord({result:"loss", resultDetail:"resign"});
  renderPostGameBar();
}

/* ===== 설정/시작 ===== */
function renderOppCard(){
  document.getElementById("ava").src=opp.imgC;
  document.getElementById("ava").alt=opp.name;
  document.getElementById("oName").textContent=opp.name;
  document.getElementById("oNameIntl").textContent=opp.nameEn+" | "+opp.nameRu;
  document.getElementById("oTitle").textContent=opp.title;
  document.getElementById("oStats").innerHTML=
    '<span class="chip elo">ELO <b>'+opp.rating+'</b></span>'+
    '<span class="chip">기풍 <b>'+opp.styleLabel+'</b></span>'+
    '<span class="chip">선호 기물 <b>'+opp.favLabel+'</b></span>'+
    '<span class="chip">선호 오프닝 <b>'+opp.openLabel+'</b></span>';
}
function renderOppButtons(){
  var wrap=document.getElementById("opps"); wrap.innerHTML="";
  CHARACTERS.forEach(function(ch){
    var d=document.createElement("div");
    d.className="opp"+(ch.id===opp.id?" on":"");

    d.onclick=function(){ if(analyzing||reviewIndex>=0||thinking) return; opp=ch; renderOppButtons(); renderOppCard(); newGame(); closeMenu(); };

  });

function setSide(c){
  if(analyzing||reviewIndex>=0||thinking) return;
  playerColor=c;
  document.getElementById("segW").classList.toggle("on",c==="w");
  document.getElementById("segB").classList.toggle("on",c==="b");
  newGame();
}

function newGame(){
  if(analyzing||reviewIndex>=0||thinking) return;
  game=new Chess();
  gameOver=false; thinking=false; selected=null; targets=[]; lastMove=null; lastLine="";
  analyzing=false; reviewIndex=-1; lastAnalysis=null; currentGameId=null;
  origHist=[]; analysisResults=[]; analysisAbort=false; reviewGameSnapshot=null;
  document.getElementById("scrim").classList.remove("show");
  setSheetExpanded(false);
  renderPostGameBar(); renderAnalysisSummary(null); renderMoveLog();
  renderOppCard(); render();
  speak("start");
  if(game.turn()!==playerColor){ // 봇이 선공(내가 흑)
    triggerBotMove();
  } else {
    setStatus(turnText(),"");
  }
}

/* ===== 상대 선택 모달 ===== */
var charPick=null;
function renderCharModal(){
  var wrap=document.getElementById("charGrid"); wrap.innerHTML="";
  charPick=null;
  document.getElementById("charConfirm").disabled=true;
  CHARACTERS.forEach(function(ch){
    var d=document.createElement("div");
    d.className="charCard";
    d.innerHTML=
      '<div class="photo"><img src="'+ch.imgA+'" alt="'+ch.name+'"></div>'+
      '<div class="cName">'+ch.name+'<span class="cEl">ELO '+ch.rating+'</span></div>';
    d.onclick=function(){ pickCharacter(ch,d); };
    wrap.appendChild(d);
  });
}
function pickCharacter(ch,el){
  charPick=ch;
  var kids=document.getElementById("charGrid").children;
  for(var i=0;i<kids.length;i++) kids[i].classList.remove("on");
  el.classList.add("on");
  document.getElementById("charConfirm").disabled=false;
}
function confirmCharPick(){
  if(!charPick) return; // 카드를 하나 고른 뒤에만 선택 버튼이 활성화됨
  selectCharacter(charPick);
}
function selectCharacter(ch){
  opp=ch;
  document.getElementById("charScrim").classList.remove("show"); // 즉시 사라지지 않고 CSS 트랜지션으로 페이드아웃
  renderOppCard(); renderOppButtons();
  setTimeout(startInterview,320); // 페이드아웃이 끝난 뒤 인터뷰 오버레이 시작
}

/* ===== 대국 전 인터뷰 — 캐릭터가 실력을 묻고, 답변이 난이도에 반영됨 =====
   각 캐릭터는 CHARACTERS[i].interview에 자신의 말투로 된 같은 내용의 질문을 갖는다.
   interview 필드가 없는 캐릭터는 아래 공용 질문으로 폴백된다. */
var INTERVIEW_QUESTIONS=[
  {q:"체스를 둬 본 적은 있나?", opts:[
    {label:"처음이에요",score:-2},{label:"몇 번 둬봤어요",score:0},
    {label:"꽤 둬요",score:1},{label:"오래 뒀습니다",score:2}
  ]},
  {q:"규칙은 잘 알고 있나? 캐슬링이나 앙파상 같은 것도?", opts:[
    {label:"잘 몰라요",score:-2},{label:"기본 규칙만요",score:0},{label:"전부 알아요",score:2}
  ]},
  {q:"스스로 실력이 어느 정도라고 생각하나?", opts:[
    {label:"완전 초보",score:-2},{label:"그럭저럭",score:0},
    {label:"꽤 하는 편",score:1},{label:"고수라고 생각해요",score:2}
  ]},
  {q:"살살 봐주길 바라나, 아니면 진심으로 상대해주길 원하나?", opts:[
    {label:"살살 부탁드려요",score:-2},{label:"적당히요",score:0},{label:"진심으로 부탁드립니다",score:2}
  ]}
];
function startInterview(){
  interviewActive=true; interviewIndex=0; interviewScore=0;
  document.getElementById("menuBtn").disabled=true;
  document.getElementById("board").classList.add("board-dim");
  setStatus("","");
  document.getElementById("vnPortrait").src=opp.imgB;
  document.getElementById("vnPortrait").alt=opp.name;
  document.getElementById("vnName").textContent=opp.name;
  document.getElementById("vnScrim").classList.add("show");
  renderInterviewStep();
}
function renderInterviewStep(){
  var questions=(opp.interview&&opp.interview.length)?opp.interview:INTERVIEW_QUESTIONS;
  var q=questions[interviewIndex];
  var vt=document.getElementById("vnText");
  typeInto(document.getElementById("vnBubble"), vt, q.q);
  var wrap=document.getElementById("vnChoices"); wrap.innerHTML="";
  q.opts.forEach(function(o){
    var btn=document.createElement("button");
    btn.textContent=o.label;
    btn.onclick=function(){ answerInterview(o.score); };
    wrap.appendChild(btn);
  });
  var skip=document.createElement("button");
  skip.className="skipBtn"; skip.textContent="건너뛰기 (기본값으로 바로 시작)";
  skip.onclick=function(){ finishInterview(true); };
  wrap.appendChild(skip);
}
function answerInterview(score){
  interviewScore+=score; interviewIndex++;
  var questions=(opp.interview&&opp.interview.length)?opp.interview:INTERVIEW_QUESTIONS;
  var wrap=document.getElementById("vnChoices");
  wrap.classList.add("vnOut"); // 선택지 out 애니메이션 후 다음 단계로
  setTimeout(function(){
    wrap.classList.remove("vnOut");
    if(interviewIndex>=questions.length) finishInterview(false);
    else renderInterviewStep();
  },170);
}
function finishInterview(skipped){
  interviewActive=false;
  document.getElementById("menuBtn").disabled=false;
  document.getElementById("board").classList.remove("board-dim");
  document.getElementById("vnScrim").classList.remove("show");
  document.getElementById("vnChoices").innerHTML="";
  var lvl="medium";
  if(!skipped){
    if(interviewScore<=-2) lvl="easy";
    else if(interviewScore>=3) lvl="hard";
  }
  applyDifficulty(lvl);
  if(chessReady) newGame(); else pendingStart=true;
}

/* ===== chess.js 로더 (cdnjs 다중 폴백) ===== */
function init(){
  chessReady=true;
  if(!game){ game=new Chess(); render(); } // 모달 뒤로 보이는 장식용 초기 보드
  if(pendingStart){ pendingStart=false; newGame(); }
}
renderOppCard();
renderCharModal();
// 처음 페이지가 그려진 뒤에 show를 붙여야 트랜지션(팝업 효과)이 실제로 재생된다
requestAnimationFrame(function(){
  requestAnimationFrame(function(){
    document.getElementById("charScrim").classList.add("show");
  });
});
var CDNS=[
  "https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.1/chess.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"
];
function loadSeq(i){
  if(typeof Chess!=="undefined"){ init(); return; }
  if(i>=CDNS.length){ document.getElementById("err").style.display="block"; return; }
  var s=document.createElement("script");
  s.src=CDNS[i];
  s.onload=function(){ if(typeof Chess!=="undefined") init(); else loadSeq(i+1); };
  s.onerror=function(){ loadSeq(i+1); };
  document.head.appendChild(s);
}
loadSeq(0);
</script>
