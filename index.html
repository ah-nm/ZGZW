<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1a1614">
<title>ZUGZWANG</title>
<style>
  :root{
    --bg:#1a1614; --panel:#221c19; --panel2:#2b231f;
    --ink:#efe7da; --muted:#a99c8c; --line:#3a302a;
    --red:#b5322b; --red-dk:#7d201c; --brass:#c9a35a;
    --light:#e7d6b4; --dark:#9a6a45;       /* board */
    --sel:#d9b54a; --last:rgba(217,181,74,.45); --chk:#cf3b34;
    --shadow:0 18px 50px rgba(0,0,0,.55);
    --sheetPeek:64px; /* 하단 시트가 접혀 있을 때 항상 보이는 높이(그립+컨트롤 행) */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 60% at 50% -10%, #2a201b 0%, var(--bg) 55%),
      var(--bg);
    color:var(--ink);
    font-family:Georgia,"Times New Roman",serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:10px 12px; max-width:520px; margin:0 auto;
    height:100vh; height:100dvh; overflow:hidden;
    display:flex; flex-direction:column;
  }
  /* 하단에 항상 이만큼 여백을 둬서, 시트가 접혀있든 펼쳐지든(분석을 켜고 꺼도) 체스판이
     차지하는 공간(=아래쪽 flex 배분)이 절대 흔들리지 않게 한다 — 시트는 position:fixed라
     이 레이아웃 흐름 밖에서 오버레이될 뿐, 체스판 크기에는 관여하지 않는다. */
  #app{display:flex;flex-direction:column;flex:1;min-height:0;padding-bottom:var(--sheetPeek)}
  .eyebrow{font:600 11px/1.2 "Arial Narrow",Arial,sans-serif;letter-spacing:.32em;text-transform:uppercase;color:var(--brass)}
  header{position:relative;z-index:41;border-bottom:2px solid var(--red);padding-bottom:8px;margin-bottom:8px;flex:0 0 auto}
  header .hdrRow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  header .star{color:var(--red);font-size:15px;margin-right:7px}
  h1{font:800 22px/1.05 "Arial Black",Arial,sans-serif;letter-spacing:.01em;margin:4px 0 2px;text-transform:uppercase}
  header .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .menuBtn{flex:0 0 auto;width:42px;height:42px;min-width:auto;padding:0;display:grid;place-items:center;
    background:var(--panel2);border:1px solid var(--line);border-radius:6px;font-size:19px;line-height:1;color:var(--ink)}
  .menuBtn:hover{border-color:var(--brass)}

  /* opponent dossier card */
  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-left:4px solid var(--red);
    border-radius:4px;padding:10px 12px;box-shadow:var(--shadow);margin-bottom:8px;
    flex:0 0 auto;
  }
  .who{display:flex;gap:14px;align-items:flex-start}
  .ava{width:104px;height:104px;flex:0 0 auto;border-radius:6px;object-fit:contain;
    border:1px solid var(--line);background:transparent}
  .who .whoText{padding-top:2px}
  .who .nm{font:800 16.5px/1.1 "Arial",sans-serif;letter-spacing:.01em}
  .who .nmIntl{color:var(--muted);font-size:10.5px;margin-top:3px;letter-spacing:.01em}
  .who .ti{color:var(--brass);font-size:11.5px;font-style:italic;margin-top:4px}
  .stat-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .chip{font:600 10.5px/1 "Arial Narrow",Arial,sans-serif;letter-spacing:.05em;
    background:#191310;border:1px solid var(--line);color:var(--muted);
    padding:5px 7px;border-radius:999px;text-transform:uppercase}
  .chip b{color:var(--ink);font-weight:800}
  .chip.elo b{color:var(--brass)}

  /* speech bubble — the signature element. 고정 높이 + 내부 스크롤로
     대사 길이가 바뀌어도 카드 전체 높이(그래서 체스판 위치)가 흔들리지 않게 한다. */
  .speech{position:relative;margin-top:9px;background:#13100e;border:1px solid var(--line);
    border-radius:6px;padding:9px 12px;height:80px;display:flex;align-items:flex-start;overflow-y:auto}
  .speech::before{content:"";position:absolute;top:-8px;left:22px;width:14px;height:14px;
    background:#13100e;border-left:1px solid var(--line);border-top:1px solid var(--line);transform:rotate(45deg)}
  .speech .q{color:var(--ink);font-family:"Apple SD Gothic Neo","Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;font-size:15.5px;line-height:1.3}
  .speech.flash{animation:flash .5s ease}
  @keyframes flash{0%{background:#241612}100%{background:#13100e}}

  /* board */
  .tray{display:flex;gap:2px;min-height:20px;align-items:center;flex-wrap:wrap;padding:2px 1px;color:#000;flex:0 0 auto}
  .tray .g{font-size:16px;line-height:1}
  .tray .g.w{color:#f3ecdd;text-shadow:0 0 1px #000,0 1px 1px rgba(0,0,0,.6)}
  .tray .g.b{color:#15110e}
  .matbar{display:flex;justify-content:space-between;align-items:center;color:var(--muted);
    font:600 11px "Arial Narrow",Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;margin:1px 0 3px;flex:0 0 auto}
  .matbar b{color:var(--brass)}
  .boardWrap{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;padding:2px 0}
  #board{width:100%;max-width:100%;max-height:100%;aspect-ratio:1/1;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
    border:3px solid #120d0a;border-radius:3px;overflow:hidden;box-shadow:var(--shadow);touch-action:manipulation;user-select:none}
  .sq{position:relative;display:grid;place-items:center;cursor:pointer;min-width:0;min-height:0;overflow:hidden}
  .sq.l{background:var(--light)} .sq.d{background:var(--dark)}
  .sq .pc{font-size:min(8.5vw,calc(var(--cell,54px) * .78),42px);line-height:1;z-index:2;pointer-events:none}
  .pc.w{color:#f6efe1;text-shadow:0 1px 0 #6b4a2e,0 0 2px rgba(0,0,0,.45),0 2px 3px rgba(0,0,0,.35)}
  .pc.b{color:#161210;text-shadow:0 1px 0 rgba(255,255,255,.18)}
  .sq.sel::after{content:"";position:absolute;inset:0;background:var(--sel);opacity:.45;z-index:1}
  .sq.last::after{content:"";position:absolute;inset:0;background:var(--last);z-index:0}
  /* 복기 중엔 마지막 수 칸을 일반 하이라이트(.last) 대신 그 수의 라벨 색으로 칠해서
     한눈에 수준을 보여준다(§renderMoveLog/gotoPly와 같은 라벨 체계, 붉은색=블런더/노란색=최선수) */
  .sq.q-book::after,.sq.q-best::after,.sq.q-great::after,.sq.q-good::after,
  .sq.q-inaccuracy::after,.sq.q-mistake::after,.sq.q-blunder::after{content:"";position:absolute;inset:0;z-index:0}
  .sq.q-book::after{background:rgba(154,142,130,.5)}
  .sq.q-best::after{background:rgba(232,199,74,.62)}
  .sq.q-great::after{background:rgba(201,170,90,.55)}
  .sq.q-good::after{background:rgba(150,181,140,.4)}
  .sq.q-inaccuracy::after{background:rgba(217,154,63,.55)}
  .sq.q-mistake::after{background:rgba(217,112,63,.6)}
  .sq.q-blunder::after{background:rgba(207,59,52,.65)}
  .sq.chk::after{content:"";position:absolute;inset:0;background:radial-gradient(circle,var(--chk) 0%,transparent 72%);opacity:.85;z-index:1}
  .sq .dot{position:absolute;width:30%;height:30%;border-radius:50%;background:rgba(20,15,11,.42);z-index:3}
  .sq.cap .dot{width:88%;height:88%;background:transparent;border:5px solid rgba(20,15,11,.42);box-sizing:border-box}
  .sq .co{position:absolute;font:700 9px Arial,sans-serif;color:rgba(20,15,11,.5);z-index:1}
  .sq.l .co{color:rgba(120,70,40,.7)} .sq.d .co{color:rgba(231,214,180,.75)}
  .sq .co.f{right:3px;bottom:1px} .sq .co.r{left:3px;top:1px}

  /* 기보 로그 — 이제 고정 높이 박스가 아니라 하단 시트(.bottomSheet) 안에서 흘러가는 콘텐츠.
     체스닷컴처럼 수순을 훑어볼 수 있게. 스크롤은 부모인 .sheetBody가 담당(중첩 스크롤 방지). */
  .moveLog{background:#13100e;border:1px solid var(--line);border-radius:6px;margin-top:5px;padding:2px 4px}
  .mlRow{display:flex;align-items:baseline;padding:2.5px 6px;font:600 12.5px/1.3 "Consolas","Courier New",monospace;
    color:var(--muted);border-bottom:1px solid rgba(255,255,255,.04)}
  .mlRow:last-child{border-bottom:none}
  .mlRow .mlNum{flex:0 0 28px;color:var(--brass)}
  .mlRow .mlW,.mlRow .mlB{flex:1;color:var(--ink)}
  .moveLog:empty::after,.moveLog .mlEmpty{display:block;text-align:center;color:var(--muted);
    font:italic 12px Georgia,serif;padding:10px 0}

  #status{text-align:center;margin:8px 0 0;font:700 14px "Arial",sans-serif;letter-spacing:.02em;min-height:20px;flex:0 0 auto}
  #status.win{color:var(--brass)} #status.lose{color:var(--red)} #status.think{color:var(--muted);font-style:italic}

  /* slide-down menu (moved from in-page controls) */
  .menuScrim{position:fixed;inset:0;background:rgba(8,6,5,.68);opacity:0;visibility:hidden;
    transition:opacity .2s,visibility 0s linear .2s;z-index:40}
  .menuScrim.show{opacity:1;visibility:visible;transition:opacity .2s,visibility 0s linear 0s}
  .menuPanel{position:absolute;top:0;left:0;right:0;margin:0 auto;max-width:520px;
    background:linear-gradient(180deg,var(--panel2),var(--panel));border-bottom:2px solid var(--red);
    box-shadow:var(--shadow);padding:16px 14px 20px;max-height:92vh;overflow-y:auto;
    transform:translateY(-16px);opacity:0;transition:transform .22s ease,opacity .22s ease}
  .menuScrim.show .menuPanel{transform:translateY(0);opacity:1}
  .lbl{font:600 10px "Arial Narrow",Arial,sans-serif;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  .lbl:first-child{margin-top:0}
  .opps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .opp{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:9px 6px;text-align:center;cursor:pointer;transition:.12s}
  .opp:hover{border-color:var(--brass)}
  .opp.on{border-color:var(--red);background:#2a1714;box-shadow:inset 0 0 0 1px var(--red)}
  .opp .on-nm{font:800 13px "Arial",sans-serif;display:block}
  .opp .on-el{color:var(--brass);font-size:11px}
  .btns{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  button{font:700 13px "Arial",sans-serif;letter-spacing:.03em;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:4px;padding:11px 12px;cursor:pointer;flex:1;min-width:96px;transition:.12s}
  button:hover{border-color:var(--brass)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.4;cursor:default;pointer-events:none}
  button.seg{flex:1}
  button.seg.on{background:var(--red);border-color:var(--red);color:#fff}
  button.primary{background:var(--red);border-color:var(--red-dk);color:#fff}
  .seg-wrap{display:flex;gap:7px}

  /* promotion modal / opponent-select modal — 어두운 배경에서 살짝 튀어오르듯 팝업,
     닫힐 때도 즉시 사라지지 않고 자연스럽게 페이드아웃 */
  .scrim{position:fixed;inset:0;background:rgba(8,6,5,.72);display:grid;place-items:center;z-index:50;padding:20px;
    opacity:0;visibility:hidden;transition:opacity .28s ease,visibility 0s linear .28s}
  .scrim.show{opacity:1;visibility:visible;transition:opacity .28s ease,visibility 0s linear 0s}
  .scrim>*{transform:scale(.92) translateY(10px);opacity:0;
    transition:transform .32s cubic-bezier(.22,.68,0,1.2),opacity .28s ease}
  .scrim.show>*{transform:scale(1) translateY(0);opacity:1}
  .promo{background:var(--panel);border:1px solid var(--brass);border-radius:8px;padding:16px 16px 12px;text-align:center;box-shadow:var(--shadow)}
  .promo h3{margin:0 0 12px;font:800 15px "Arial",sans-serif}
  .promo .row{display:flex;gap:10px}
  .promo button{font-size:34px;padding:6px 10px;flex:0 0 auto;min-width:auto}

  .err{display:none;background:#2a1714;border:1px solid var(--red);border-radius:6px;padding:14px;color:var(--ink);font-size:13.5px;margin-bottom:12px;flex:0 0 auto}

  /* opponent-select modal — tall, mobile screen-filling rectangle */
  .charModal{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--brass);
    border-radius:8px;padding:22px 18px 24px;box-shadow:var(--shadow);max-width:480px;width:100%;
    min-height:82vh;display:flex;flex-direction:column}
  .charModal .cmHead{text-align:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:16px;flex:0 0 auto}
  .charModal .cmHead h2{font:800 19px "Arial",sans-serif;margin:6px 0 2px;color:var(--ink);
    text-transform:uppercase;letter-spacing:.01em}
  .charModal .cmHead .sub{color:var(--muted);font-size:12.5px}
  .charGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0;flex:1;align-content:center}
  .charCard{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;
    cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s}
  .charCard:hover{border-color:var(--brass)}
  .charCard.on{border-color:var(--red);box-shadow:inset 0 0 0 2px var(--red)}
  .charCard .photo{position:relative;width:100%;aspect-ratio:2/5;overflow:hidden;background:#000}
  .charCard .photo img{width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) contrast(.95) brightness(.75);transition:filter .3s}
  .charCard.on .photo img{filter:none}
  .charCard .cName{padding:8px 4px 9px;text-align:center;font:800 12.5px "Arial",sans-serif;
    color:var(--ink);letter-spacing:.01em;line-height:1.25}
  .charCard .cEl{display:block;color:var(--brass);font:600 10.5px "Arial Narrow",Arial,sans-serif;margin-top:1px}
  .charModal .cmFoot{flex:0 0 auto;margin-top:16px}
  .charModal .confirmBtn{width:100%;padding:13px 12px;font-size:15px}

  #board.board-dim{filter:brightness(.45);pointer-events:none;transition:filter .2s}

  /* 인터뷰 — 비주얼노벨 스타일 오버레이: 체스판이 속한 문서 흐름과 완전히 분리되어
     대사/선택지 길이가 아무리 바뀌어도 뒤의 체스판 레이아웃에 전혀 영향을 주지 않는다. */
  .vnScrim{position:fixed;inset:0;background:rgba(8,6,5,.78);z-index:60;
    display:flex;flex-direction:column;justify-content:flex-end;opacity:0;visibility:hidden;
    transition:opacity .3s ease,visibility 0s linear .3s}
  .vnScrim.show{opacity:1;visibility:visible;transition:opacity .3s ease,visibility 0s linear 0s}
  /* position:absolute + inset:0라 vnStage/vnBox(캐릭터+말풍선, 하단 도킹)의 예약 높이와
     무관하게 화면 전체 높이를 기준으로 중앙 정렬된다 — 화제 개수가 적을 때도 화면 위쪽에
     붕 뜨지 않고, 캐릭터 머리 위 여백도 줄어든다(하단 padding으로 말풍선과의 겹침만 방지). */
  .vnChoices{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;
    gap:9px;padding:20px 20px 190px;max-width:520px;width:100%;margin:0 auto;
    overflow-y:auto;box-sizing:border-box;transition:opacity .16s ease}
  .vnChoices.vnOut{opacity:0}
  @keyframes vnBtnIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .vnChoices button{width:100%;text-align:left;background:var(--panel2);flex:none;font-size:14px;
    animation:vnBtnIn .32s ease both}
  .vnChoices button:hover{border-color:var(--brass)}
  .vnChoices .skipBtn{margin-top:6px;background:transparent;border:1px dashed var(--line);
    color:var(--muted);font-size:11.5px;padding:8px 10px;text-align:center}
  .vnStage{flex:0 0 auto;display:flex;align-items:flex-end;justify-content:flex-start;
    max-width:520px;width:100%;margin:0 auto;padding-left:18px;
    margin-bottom:-30px;pointer-events:none}
  .vnPortrait{height:280px;max-height:50vh;width:auto;max-width:75%;object-fit:contain;
    object-position:50% 100%;filter:drop-shadow(0 10px 20px rgba(0,0,0,.5))}
  .vnBox{position:relative;flex:0 0 auto;max-width:520px;width:100%;margin:0 auto;box-sizing:border-box;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border-top:2px solid var(--red);box-shadow:0 -12px 30px rgba(0,0,0,.5);
    padding:12px 16px calc(18px + env(safe-area-inset-bottom,0px));
    transform:translateY(100%);transition:transform .42s cubic-bezier(.22,.68,0,1.15)}
  .vnScrim.show .vnBox{transform:translateY(0)}
  .vnWho{margin-bottom:8px}
  .vnName{font:800 15px "Arial",sans-serif;color:var(--brass);letter-spacing:.01em}
  .vnText{position:relative;background:#13100e;border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;height:76px;overflow-y:auto;box-sizing:border-box}
  .vnText span{color:var(--ink);font-family:"Apple SD Gothic Neo","Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;font-size:15px;line-height:1.35}
  .vnNext{position:absolute;right:8px;bottom:6px;color:var(--brass);font-size:13px;
    opacity:0;pointer-events:none;transition:opacity .15s ease;animation:vnNextBob 1s ease-in-out infinite}
  .vnNext.show{opacity:1}
  @keyframes vnNextBob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

  /* 대국 분석 + 기보 — 하단 시트(bottom sheet)로 오버레이.
     position:fixed라 #app의 flex 배분(그래서 체스판 크기)과 완전히 무관하다 — 접혀있든
     펼쳐있든, 분석 중이든 아니든 체스판은 항상 같은 크기(§app의 --sheetPeek 여백만 고정 예약). */
  .bottomSheet{position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:520px;
    height:min(68vh,520px);
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;
    box-shadow:0 -14px 34px rgba(0,0,0,.5);
    display:flex;flex-direction:column;z-index:35;
    transform:translateY(calc(100% - var(--sheetPeek)));
    transition:transform .32s cubic-bezier(.22,.68,0,1.15);
  }
  .bottomSheet.expanded{transform:translateY(0)}
  .sheetHandle{flex:0 0 auto;height:20px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;touch-action:none}
  .sheetGrip{width:36px;height:4px;border-radius:999px;background:var(--line);transition:background .15s}
  .sheetHandle:hover .sheetGrip{background:var(--brass)}
  .sheetControls{flex:0 0 auto;height:44px;display:flex;align-items:center;gap:8px;padding:0 10px 8px}
  .sheetBody{flex:1;min-height:0;overflow-y:auto;padding:0 10px 12px}
  .sheetIdleInfo{flex:1;text-align:center;color:var(--muted);font:600 12px "Arial Narrow",Arial,sans-serif}
  .sheetIdleInfo b{color:var(--brass)}

  .pgbBtn{flex:1;background:var(--panel2);border:1px solid var(--brass);color:var(--brass);
    font:700 13px "Arial",sans-serif;padding:10px 12px;border-radius:6px;cursor:pointer}
  .pgbBtn:hover{background:#2a2016}
  .pgbProgress{flex:1;height:6px;background:#13100e;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .pgbProgressFill{height:100%;background:var(--brass);transition:width .2s ease}
  .pgbProgressText{color:var(--muted);font:600 11px "Arial Narrow",Arial,sans-serif;white-space:nowrap}
  .pgbCancel{flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:11.5px;padding:8px 10px;min-width:auto}

  /* 대국 분석 진행바(최상단 탭) — #sheetControls의 진행바는 잡담 중엔 vnScrim(z-index 60)에
     가려 잘 안 보이므로, vnScrim보다 위(z-index 70)에 떠서 잡담 중에도 항상 보이게 한다. */
  .analysisTopBar{position:fixed;top:0;left:0;right:0;z-index:70;margin:0 auto;max-width:520px;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border-bottom:2px solid var(--red);box-shadow:0 6px 16px rgba(0,0,0,.4);
    padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top,0px));
    display:flex;align-items:center;gap:8px;
    transform:translateY(-100%);transition:transform .25s ease;pointer-events:none}
  .analysisTopBar.show{transform:translateY(0);pointer-events:auto}
  .atbTrack{flex:1;height:6px;background:#13100e;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .atbFill{height:100%;background:var(--brass);transition:width .2s ease}
  .atbText{color:var(--muted);font:600 11px "Arial Narrow",Arial,sans-serif;white-space:nowrap}
  .atbCancel{flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:11.5px;padding:6px 9px;min-width:auto}
  .navArrow{flex:0 0 auto;min-width:44px;padding:9px 8px;font-size:16px}
  .navArrow:disabled{opacity:.3}
  .navInfo{flex:1;text-align:center;font:600 12px "Arial Narrow",Arial,sans-serif;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .navClose{flex:0 0 auto;min-width:auto;padding:9px 10px;background:transparent;border:1px solid var(--line);color:var(--muted)}

  /* 분석 요약 패널 */
  .analysisSummary{display:none;background:#13100e;border:1px solid var(--line);border-radius:6px;
    padding:8px 10px;margin-bottom:5px;font:600 12px "Arial Narrow",Arial,sans-serif;color:var(--muted)}
  .asAcc{display:flex;justify-content:space-between;margin-bottom:4px}
  .asAcc b{color:var(--brass)}
  .asWorstLbl{color:var(--muted);margin:4px 0 2px;letter-spacing:.05em;text-transform:uppercase;font-size:10px}
  .asWorstItem{padding:3px 0;color:var(--ink);cursor:pointer;font-family:"Consolas","Courier New",monospace;font-size:12px}
  .asWorstItem:hover{color:var(--brass)}

  /* 기보 로그 라벨 아이콘 + 복기 중 현재 수 하이라이트 */
  .mlTag{display:inline-block;margin-left:4px;font-size:10.5px;cursor:pointer;padding:0 2px}
  .mlTag.t-book{color:var(--muted)}
  .mlTag.t-best,.mlTag.t-great{color:var(--brass)}
  .mlTag.t-good{color:var(--muted)}
  .mlTag.t-inaccuracy{color:#d99a3f}
  .mlTag.t-mistake{color:#d9703f}
  .mlTag.t-blunder{color:var(--red)}
  .mlRow.cur{background:rgba(217,181,74,.14)}

  /* 지난 대국 목록(메뉴) */
  .pastGames{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
  .pgRow{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
    border-radius:4px;padding:7px 9px;cursor:pointer;font:600 11.5px "Arial Narrow",Arial,sans-serif}
  .pgRow:hover{border-color:var(--brass)}
  .pgNum{color:var(--brass);flex:0 0 auto}
  .pgOpp{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pgResult{flex:0 0 auto;padding:1px 6px;border-radius:999px;font-weight:800}
  .pgResult.pg-win{color:var(--brass)}
  .pgResult.pg-loss{color:var(--red)}
  .pgResult.pg-draw{color:var(--muted)}
  .pgMeta{flex:0 0 auto;color:var(--muted);font-size:10.5px}
  .pgEmpty{color:var(--muted);font:italic 12px Georgia,serif;text-align:center;padding:8px 0}
  .pgMore{margin-top:2px}
</style>
</head>
<body>

<div id="app">
<header>
  <div class="hdrRow">
    <div>
      <div class="eyebrow"><span class="star">★</span>ZUGZWANG</div>
      <h1>체스 클럽</h1>
    </div>
    <button class="menuBtn" id="menuBtn" onclick="toggleMenu()" aria-label="메뉴 열기">☰</button>
  </div>
</header>

<div class="err" id="err">엔진(chess.js)을 불러오지 못했어요. 인터넷 연결을 확인한 뒤 새로고침해 주세요. (네트워크가 막힌 환경이면 cdnjs 접근 허용이 필요합니다.)</div>

<div class="card">
  <div class="who">
    <img class="ava" id="ava" src="" alt="">
    <div class="whoText">
      <div class="nm" id="oName">—</div>
      <div class="nmIntl" id="oNameIntl">—</div>
      <div class="ti" id="oTitle">—</div>
    </div>
  </div>
  <div class="stat-row" id="oStats"></div>
  <div class="speech" id="speech"><span class="q" id="bubble">…</span></div>
</div>

<div class="tray" id="trayTop"></div>
<div class="matbar"><span id="matTop">상대</span><span id="matBot"></span></div>
<div class="boardWrap" id="boardWrap"><div id="board"></div></div>
<div class="tray" id="trayBot"></div>

<div id="status" aria-live="polite">대국 준비 완료.</div>
</div>

<!-- 기보/분석 하단 시트 — position:fixed 오버레이라 #app의 flex 배분(체스판 크기)에 영향 없음.
     접힌 상태는 그립+컨트롤 행만 노출, 위로 스와이프/탭하면 기보 전체가 체스판 위로 펼쳐짐. -->
<div class="bottomSheet" id="bottomSheet">
  <div class="sheetHandle" id="sheetHandle"><div class="sheetGrip"></div></div>
  <div class="sheetControls" id="sheetControls"></div>
  <div class="sheetBody" id="sheetBody">
    <div class="analysisSummary" id="analysisSummary"></div>
    <div class="moveLog" id="moveLog"></div>
  </div>
</div>

<div class="menuScrim" id="menuScrim" onclick="if(event.target===this) closeMenu()">
  <div class="menuPanel" id="menuPanel">
    <div class="lbl">상대 선택</div>
    <div class="opps" id="opps"></div>

    <div class="lbl">내 진영</div>
    <div class="seg-wrap">
      <button class="seg on" id="segW" onclick="setSide('w');closeMenu()">백 (선공)</button>
      <button class="seg" id="segB" onclick="setSide('b');closeMenu()">흑 (후공)</button>
    </div>

    <div class="btns">
      <button id="undoBtn" onclick="undoMove();closeMenu()">무르기</button>
      <button id="resignBtn" onclick="resignGame();closeMenu()">기권</button>
      <button class="primary" onclick="newGame();closeMenu()">새 대국</button>
    </div>

    <div class="lbl">난이도</div>
    <div class="seg-wrap" id="diffSeg">
      <button class="seg" data-lvl="easy" onclick="applyDifficulty('easy');closeMenu()">쉬움</button>
      <button class="seg on" data-lvl="medium" onclick="applyDifficulty('medium');closeMenu()">중간</button>
      <button class="seg" data-lvl="hard" onclick="applyDifficulty('hard');closeMenu()">어려움</button>
    </div>

    <div class="lbl">지난 대국</div>
    <div class="pastGames" id="pastGames"></div>
  </div>
</div>

<div class="vnScrim" id="vnScrim">
  <div class="vnChoices" id="vnChoices"></div>
  <div class="vnStage"><img class="vnPortrait" id="vnPortrait" src="" alt=""></div>
  <div class="vnBox">
    <div class="vnWho">
      <span class="vnName" id="vnName">—</span>
    </div>
    <div class="vnText" id="vnText"><span id="vnBubble">…</span><span class="vnNext" id="vnNext">▾</span></div>
  </div>
</div>

<!-- 대국 분석 진행바(최상단) — vnScrim(잡담 오버레이)보다 위에 떠서, 잡담하는 동안에도
     검토 진행 상황이 항상 보이게 한다. renderPostGameBar()가 #sheetControls와 함께 갱신. -->
<div class="analysisTopBar" id="analysisTopBar">
  <div class="atbTrack"><div class="atbFill" id="atbFill" style="width:0%"></div></div>
  <div class="atbText" id="atbText">검토 중…</div>
  <button class="atbCancel" onclick="cancelAnalysis()">취소</button>
</div>

<div class="scrim" id="scrim">
  <div class="promo">
    <h3>승급할 기물</h3>
    <div class="row" id="promoRow"></div>
  </div>
</div>

<div class="scrim" id="charScrim">
  <div class="charModal">
    <div class="cmHead">
      <div class="eyebrow"><span class="star">★</span></div>
      <h2>대전 상대를 고르세요</h2>
      <div class="sub">나중에 변경할 수 있습니다.</div>
    </div>
    <div class="charGrid" id="charGrid"></div>
    <div class="cmFoot">
      <button class="primary confirmBtn" id="charConfirm" disabled onclick="confirmCharPick()">선택</button>
    </div>
  </div>
</div>

<script>
/* ============================================================

   - rating        : 표시용 레이팅(숫자만; 강함은 아래 depth/temp/blunder로 결정)
   - depth         : 탐색 깊이(2~4 권장, 기본 3). 클수록 강함 (SEARCH_BUDGET 초과 시 자동으로 잘려 안전)
   - temp          : 수 선택 '온도'. 낮을수록 최선수 위주(강함), 높을수록 변칙/기풍 반영

   - earlyQueenPenalty : 초반 퀸 조기 출격 억제(차분/수비형용)

            {q:"자보론코프는 전망이 있습니까?", a:[ ["전망이라...", "아직 가공되지 않은 기물이지만, 투자가 가치 있는 자산임은 분명하네.", "직관과 공격성이 뛰어나서 연맹에서도 주시하고 있지."], ["평가서에 기록된 바대로네.", "감정에 휘둘려 불필요한 위험을 자초하는 경향이 있으나, 전술적 재능만큼은 확실한 인재군.", "다듬는 과정이 필요할 뿐이네."] ]},

          {id:"federation", label:"연맹에 대해", subs:[
            {q:"소비에트 체스 연맹은 어떤 곳인가?", a:[ ["질서와 위계가 있는 곳일세.", "규율 없이는 이 판 위에서도 아무것도 서지 않네."] ]},

            {q:"소련 체스는 왜 이렇게 강해요?", a:[ ["탄탄하게 체계화된 국립 피오네르 교육 인프라와 꾸준한 이론 연구, 그리고 연맹의 엄격한 기사 선발 절차 덕분이네.", "국가적인 차원에서의 집중적인 자원 투입이 가져온 결과물이지."], ["체계의 승리네.", "한 기사의 일시적인 영감에 의존하는 서방과 달리, 우리는 축적된 수만 건의 오프닝 데이터베이스와 엄밀한 분석가 협업 체계를 통해 안정적인 기사들을 길러내기 때문이지."] ]},
            {q:"신문은 주로 어떤 걸 읽으세요?", a:[ ["연맹 내부의 공보들과 체스 전문지 64를 주로 읽네.", "기사의 내용보다는 그 속에 인쇄된 분석 도표나 선수 동향 기사의 조판 오류, 혹은 오탈자를 찾아 정정하는 쪽이 재미있지만 말일세."], ["정기 발행되는 체스 전문 간행물들이네.", "활자 뒤 정치적 행간을 읽어내는 능력이 내 지위와 안전을 지켜주는 데 필수적이니까."] ]},
            {q:"서류 일, 지겹지 않아요?", a:[ ["지겨움이라는 감정은 행정가에겐 태만에 가깝겠지.", "허술한 조항 하나, 오기 하나가 무고한 기사의 인생을 단번에 매장해 버릴 수도 있다는 걸 안다면,", "감히 지루함 따위의 투정을 부릴 수는 없네."], ["귀찮고 단조로운 일일세.", "하지만 때로는 서류가 우리 선수단을 지키는 최고의 방패가 되어 주기도 하네."] ]},
            {q:"선생님이 지키는 규정들… 선생님은 그걸 믿어요?", a:[ ["믿음은 규정의 정당한 작동 요건이 아니네.", "규정의 유일하고 위대한 장점은, 그것이 규정을 불신하고 부정하는 인간보다 훨씬 더 끈질기게 이 땅에 살아남는다는 사실이지.", "나는 살아남은 질서의 도구로서 서류를 작성할 뿐일세."], ["내가 규정을 신뢰하느냐고... 지나치게 사색적이군.", "규정은 사람을 보호하지 않네.", "절차에 순응하는 기계들만을 통과시켜 줄 뿐이지.", "내가 만약 그 절차들을 믿지 않고 한순간이라도 사적인 연민을 허용하는 순간, 이 기계 장치는 우리 모두를 한꺼번에 짓이겨 버릴 걸세."] ]}
          ]},
          {id:"chess", label:"체스에 대해", subs:[
            {q:"체스의 어떤 점이 좋나?", a:[ ["정직함일세.", "판 위에서는 변명이 통하지 않네."] ]},
            {q:"가장 좋아하는 국면이 있나?", a:[ ["룩 엔드게임일세.", "단순해 보이지만, 그 안에 모든 게 있지."] ]},
            {q:"제일 좋아하는 기물이 뭐예요?", a:[ ["룩일세.", "정직하게 직선으로 뻗어가며, 절대 타협하지 않지.", "그리고 종반전에 이르면 판 전체의 질서를 묵묵히 통제하지 않나.", "그 위엄을 좋아하네."], ["단연 룩일세.", "기하학적 필연성에 가장 충실하며, 종반전에서 가장 정직한 힘을 가졌기 때문이지."] ]},
            {q:"블리츠(속기전) 좋아해요?", a:[ ["경멸하네.", "사고의 깊이를 덜어내고, 오직 즉흥적인 손버릇과 시간 압박의 공포로 승부를 가리는 짓은...", "체스에 대한 모독이나 다름없지."], ["좋아하지 않네.", "진정한 체스는 긴 사색 속에서 완성되는 것인데, 블리츠는 그 깊이를 얄팍한 반사신경의 싸움으로 변질시키기 때문이네."] ]},
            {q:"체스 배우는 사람한테 조언 한마디 해준다면?", a:[ ["지지 않는 법부터 배우게.", "화려한 전술을 탐하기 전에, 내 판에 빈틈을 만들지 않는 수비와 견고한 기본 구조를 먼저 익히는 것이 오래 가는 유일한 길이네."], ["자기 수에 책임을 지는 태도부터 갖추어야 하네.", "판 위의 기물은 한 번 움직이면 결코 무를 수 없으며, 모든 수에는 그에 상응하는 결말이 반드시 따르는 법이지."] ]},

            {q:"체스는 예술인가요, 과학인가요, 스포츠인가요?", a:[ ["과학에 가까운 가혹한 노동이네.", "매 순간 완벽한 논리적 인과관계를 검증해야 하며, 감정이나 영감 따위가 끼어들 틈을 주어서는 안 되네.", "철저한 계산과 훈련으로 완성되는 지적인 연마 과정이지."], ["정밀한 논리의 체계이자 엄격한 지적 법칙을 탐구하는 과학이네.", "예술이라는 단어는 무책임한 환상이야. 판 위의 물리적 현실을 객관적으로 분석하는 작업에 더 가깝지."] ]},
            {q:"기억에 남는 대국 하나만 얘기해 줘요.", a:[ ["1962년 레닌그라드에서 둔 룩 엔딩 대국이네.", "아침부터 시작된 대국이 밤늦게 봉수 대국으로 이어졌지.", "밤새도록 방에서 주석을 달며 완벽한 무승부 라인을 계산해 냈고, 이튿날 아침 상대에게 단 한 칸의 틈도 주지 않고 대국을 종결지었네.", "그 정교한 적막감이 아직도 선하군."], ["오래전 선수 시절, 연맹 위원들의 눈초리 아래서 홀로 치렀던 어떤 무명의 예선전이었네.", "승리 직전의 순간, 내가 둔 완벽한 수순 앞에 상대가 조용히 고개를 떨구었지.", "기쁨보다도 판 위의 모든 비명이 마침내 잦아들었다는 안도감이 더 컸던 대국이었네."] ]},
            {q:"체스가 싫어진 적 있어요?", a:[ ["체스가... 체스가 싫어진 일은 없네.", "내 손끝으로 통제할 수 있는 것이 오직 64칸의 사각형 격자뿐이라는 그 사실을 자각하는 매 순간이 뼈아플 뿐이었지."], ["체스라는 게임 자체를 원망한 적은 단 한 번도 없네.", "단지 판 밖의 흙발들이 그 깨끗한 나무 격자판 위에 제멋대로 발자국을 남길 때, 그 얼룩들을 묵묵히 닦아내야 하는 내 직무가 조금 고단했을 뿐이네."] ]},

    lines:{
      an_book:["정석대로 잘 진행되고 있네요.","이론에서 크게 벗어나지 않았어요.","매끄러운 시작입니다. 교과서에 충실하군요.","오프닝은 역시 정돈된 길을 걷는 게 단정하죠.","다들 한 번씩 거쳐가는 검증된 경로군요.","서두르지 않는 조화로운 배치네요.","클래식한 흐름은 마음을 편안하게 만듭니다.","안정적인 흐름이군요. 보기 좋습니다.","누구에게나 익숙한 대화의 시작이죠.","정석적인 전개군요. 기초가 탄탄하십니다."],
      an_best:["완벽한 수였어요.","더 나은 수는 없었을 거예요.","더할 나위 없이 정밀한 선택이네요.","정교함의 진수군요. 깊은 계산이 느껴집니다.","이 자리에서는 오직 이 수만이 올바른 답이죠.","수순의 정밀함이 고스란히 담긴 수군요.","더 나은 대안을 찾는 건 무의미해 보입니다.","가장 현명하고 안전한 자리를 고르셨네요.","수 계산이 아주 맑고 명확하군요.","체스판 위에서 구현할 수 있는 최선이군요."],
      an_great:["훌륭해요.","좋은 선택이었어요.","아주 정교하네요. 좋은 감각을 가지셨군요.","상당히 날카롭고 세련된 접근이네요.","재치 있는 선택입니다. 보기 좋습니다.","이 정도면 판을 완전히 주도할 수 있겠어요.","의도가 명확해서 흥미로운 수군요.","효과적인 동시에 단정한 해답입니다.","상당히 매끄러운 전개입니다. 마음에 드는군요.","상대의 빈틈을 영리하게 압박하네요."],
      an_good:["괜찮은 수예요.","무리 없는 선택이었어요.","무난하고 안정적인 한 수군요.","현상 유지를 위해 필요한 선택이었습니다.","흐름을 깨지 않는 무난한 결정이네요.","크게 흐트러진 곳 없이 단정한 수입니다.","방어선을 유지하는 데 충실하군요.","나름대로의 논리가 있는 견고한 수예요.","서두르지 않고 침착하게 자리를 채웠네요.","충분히 이해할 수 있는 범위 안의 수군요."],
      an_inaccuracy:["{best}였다면 조금 더 압박할 수 있었을 텐데요.","나쁘진 않지만, {best}가 더 날카로웠을 거예요.","조금 양보하신 느낌이네요. {best}가 어땠을까요.","형세의 흐름상 {best} 쪽이 더 매끄러웠을 겁니다.","조금 돌아가시는군요. {best}로 곧장 지탱했어도 좋았을 텐데.","방향이 살짝 어긋났어요. {best}로 채우는 것이 나았겠지요.","기물의 가치를 더 살릴 수 있는 {best}를 놓쳐 아쉽네요.","구조를 좀 더 단단하게 해줄 {best}가 더 효과적이었을 겁니다.","약간의 아쉬움이 남는 자리네요. {best}였다면 좋았을 텐데요.","조금 아쉬워요. {best}를 두었다면 상대가 더 곤란했을 겁니다."],
      an_mistake:["아쉽네요, 여기서 흐름을 놓쳤어요.","조금 방심하셨네요.","계산에 약간의 오차가 생긴 듯합니다.","이건 심리적인 흔들림이 묻어나는 수군요.","너무 서둘러 결정하신 것은 아닌지 모르겠네요.","수비벽에 자그만 틈을 내주셨습니다.","기물의 배치에 흐트러짐이 발생하는 자리군요.","실책에 가까운 아쉬운 전진입니다.","이 수는 상대를 너무 편안하게 만들어 주는군요.","조금 더 깊이 들여다보셨어야 했습니다."],
      an_blunder:["이건… 좀 놀랐습니다.","{best}가 있었는데, 아쉽게 됐네요.","이건 기동에 치명적인 구멍이 있네요. 되돌리기 힘든 실책입니다.","우아함과는 거리가 먼 큰 실수군요. {best}로 지켰어야 했습니다.","이런 타격은 뼈아프겠군요. {best}를 놓치신 대가입니다.","치명적인 안일함이네요. {best}로 전형을 바로잡지 않고서는 힘듭니다.","판 전체가 통째로 무너질 수 있는 위험한 수예요. {best}가 답이었는데.","이런 참사는 예방할 수 있었습니다. 당연히 {best}였어야지요.","설계가 완전히 꼬여버린 느낌이군요. {best}를 두지 않은 흔적이 큽니다.","눈앞의 일시적인 수보다 {best}로 내실을 다지는 것이 현명했을 텐데요."],
      an_wait:["잠시만요, 다시 살펴볼게요.","흐름을 천천히 되짚어보는 중입니다. 잠깐 시간을 주세요.","정리가 덜 끝났군요. 차분히 검토해 보지요.","수순을 조용히 다시 계산해 보아야겠군요.","복잡하게 얽힌 실타래를 풀 시간이 필요합니다.","기록이 명확한지 다시 점검해 보겠습니다. 잠시만 기다려주세요.","이 결정은 신중할 필요가 있겠네요. 다시 검토하지요.","잠깐 정지하고, 머릿속에서 판을 다시 그려보겠습니다.","생각의 경로를 다듬을 시간이 잠깐 필요하네요.","차 한 모금 마시며 다시 살펴봅시다. 조급할 건 없으니까요."],
      start:["반갑습니다. 좋은 저녁이군요. ...그럼, 시작할까요.","편하게 두세요. 서두를 이유는 어느 쪽에도 없으니까요.","긴 대국이 되겠군요. 기대됩니다.","차 한 잔 하시겠어요? ...아, 체스가 먼저겠군요. 시작하죠.","좋은 상대를 만나는 건 드문 일이에요. 오늘 밤을 아껴 쓰죠.","제 방식은 조용합니다. 조용한 것이 늘 편안한 건 아니지만요.","자, 앉으세요. 이 판에서만큼은 아무도 우리를 재촉하지 않으니까.","먼저 두세요. 저는 상대가 무엇을 좋아하는지 보는 걸 즐깁니다.","우아하게 시작해서, 우아하게 끝내면 좋겠군요. ...늘 뜻대로 되진 않지만요.","긴장하셨나요? 괜찮아요. 기물은 사람보다 정직하니까, 오히려 편할 겁니다.","오늘은 이기려고 두지 않겠습니다. 결과는 알아서 따라오겠죠.","시작하죠. 부디, 저를 지루하게 만들지 말아 주세요.","이 순간만큼은 세상의 모든 간섭에서 벗어날 수 있겠군요.","서로의 수를 존중하도록 하죠.","체스는 정직한 대화입니다. 말로 나누지 못하는 대화지요.","두십시오. 저는 제 속도대로 움직이겠습니다.","기물의 배치가 완벽하네요. 기분 좋은 출발입니다.","평온해서 좋습니다.","차가 완전히 식기 전에 첫 교환이 일어나지 않을까 싶군요.","자, 이제 시작해 볼까요.","시작하죠.","악수 한 번 할까요.","인사는 생략할까요.","부드럽게 가죠.","서두르지 마시길.","당신은 어떤 플레이를 보여주실지...","조금 지루하네요.","피곤한 밤이군요.","자, 첫 수.","매끄럽게 가죠.","기물은 거짓말하지 않죠.","예의를 갖춰서.","아프지 않게 해드리죠.","가볍게.","저를 실망시키지 마시길.","비숍의 길을 열어야겠죠.","당신은 어떤 사람입니까.","춤을 춰볼까요.","솔직하게 두세요.","좋아요, 즐겨봅시다.","정중히.","초반은 평화롭게.","결과가 좋을 것 같습니다.","시작.","제가 좀 끈질깁니다.","제 속도에 맞추시죠.","숨 고르시고.","실력을 볼까요.","살살 다뤄주세요.","어디 한번."],
      capture:["이건 받아 두는 편이 예의겠죠.","필요한 정리입니다.","이 수가 마음에 드는군요.","가져가겠습니다. 기분 나쁘게 듣지 마세요, 계산일 뿐이니까.","여기 두신 건 조금 성급하셨어요. 정중하게 지적하자면요.","받겠습니다. ...이런 건 지금 처리하는 게 서로 편하죠.","이 기물은 제가 맡아 두죠. 잘 두고 계셨는데, 아쉽네요.","감사히 받겠습니다.","정리 좀 하겠습니다. 방이 어수선하면 손님도 불편하니까요.","이걸 가져가야 길이 트이겠죠.","받아 두죠. 대신 제가 무엇을 열어드렸는지는, 나중에 아시게 될 거예요.","겉으론 공평해 보이는 교환이죠. 6라운드쯤 지나면 아닐 겁니다.","필요한 소모일 뿐이니 마음 쓰지 마세요.","여기가 비어야겠네요.","어쩔 수 없는 희생이라 생각하셨기를 바랍니다.","가져갑니다.","그 기물은 참 쓸쓸해 보였어요.","거두어 드리겠습니다.","가져갑니다. 이제 제 그림이 조금 더 선명해졌군요.","기교는 줄이고, 사실만 취하도록 하죠.","실례.","감사합니다.","아, 이런.","가져갑니다.","아프셨나요.","이건, 압수하겠습니다.","치워드리죠.","거슬리네요.","필요한 희생이겠죠?","챙길게요.","조금 폭력적이었나요.","깔끔하게.","이건 주셔야겠습니다.","방해됩니다.","미안해요.","제 전리품으로...","어쩔 수 없군요.","수거했습니다.","이 수순, 달콤하군요.","잘 먹겠습니다.","간식으로 나쁘지 않군요.","거절하지 않죠.","뒷정리는 잘 해야죠.","이별할 시간입니다.","가차 없이...","이별에 슬퍼 마시길.","때론 버릴 줄도 알아야죠.","너무 쉬운데요.","감사히.","기물 하나에 일희일비하지 마세요."],
      check:["체크입니다. 놀라셨나요?","왕을 잠시 불편하게 해드리죠.","체크예요. 도망칠 곳은 남겨뒀습니다. ...제가 그렇게 야박하진 않아요.","잠깐 왕을 세워 두시겠어요? 오래는 아닙니다.","체크입니다. 부드럽게 받으세요. 서두르면 더 나빠지니까.","왕이 산책을 좀 하셔야겠군요.","체크예요. 어느 쪽으로 피하실지, 저는 이미 알 것 같은데요.","불편하시죠? 저도 압니다. 그래도 이건 예정된 거예요.","체크입니다. 이건 인사 같은 거예요. 본론은 곧 시작되고요.","왕을 옮기세요. ...옮기시고 나면, 뭔가 보이실 겁니다. 유쾌하진 않은 게요.","체크. 막는 수는 있어요. 그 수가 마음에 드실지는 모르겠지만.","가볍게 체크 하나. 무게는 다음 수에 실려 있습니다.","왕을 압박하는 기분은 늘 묘합니다. 조금 미안하군요.","체크.","조심스럽게 왕을 부르고 싶군요. 체크.","방어선을 잘 확인하시죠.","체크. 왕의 품위가 흔들리는 순간이군요.","길을 열었으니, 왕을 피해 주시겠습니까.","체크입니다. 다음 계획은 이미 마련해 두었습니다.","왕의 운명이란.","체크.","조심하시죠.","길, 비키세요.","실례합니다.","조금 아플 겁니다.","피하시겠어요?","압박 좀 하죠.","인사치레입니다.","숨을 쉬시지요.","비숍을 보시는 게 좋겠군요.","불편하시겠군요.","왕이 위험하군요.","경고입니다.","가볍게 찔러보죠.","어디로 가실 건가요?","시선 피하지 마세요.","방어선을 확인해보시죠.","여기입니다.","체크입니다.","흠칫하셨네요.","방심하셨군요.","웃음기가 가시나요.","당황하지 마시길.","피할 곳은 남겼습니다.","인사 드립니다.","일을 어렵게 만드네요.","이런, 갇히셨군요.","체크. 재미있지 않나요?","제 차례입니다.","길을 열어주시죠."],
      castle:["기초부터 단단히. 본론은 지금부터입니다.","안정된 구조, 그 위에서 천천히 압박하죠.","왕을 먼저 재워두겠습니다. 밤이 길 테니까요.","집을 짓는 거예요. 화려하진 않지만, 오래 사는 집이죠.","이제 왕이 안전하니, 저도 조금 대담해져도 되겠군요.","성을 쌓았습니다.","준비를 마쳤어요. 저는 준비가 끝나야 웃기 시작하거든요.","왕과 룩을 한 번에. 이런 정돈된 순간을 저는 좋아합니다.","안전을 확보했습니다. 우아함은 안전 위에서만 피어나죠.","구석으로 왕을 모셨어요. 답답해 보이죠? 그래도 따뜻합니다.","이 수엔 위협이 없어요. 다음 수부터 있을 뿐이죠.","집을 다 지었으니, 이제 손님 대접을 할 차례군요. ...제 방식으로요.","방어를 마쳤으니 이제 본격적으로 시작해 볼까요.","겉보기엔 단순하지만 마음이 편안해지죠.","당신 성도 참 아름다운데, 들여다보러 가야겠네요.","성벽을 견고히 하고 가겠습니다.","왕에게 가장 안락한 침실을 준비했습니다.","이제 사냥에 집중할 시간입니다.","룩이 활동하기 가장 좋은 자리를 잡았군요.","안전을 우선하는 게 제 생존 방식입니다.","문 닫겠습니다.","안전하게 가죠.","잠시 쉴까요.","커튼을 내리죠.","방어도 확실히.","킹은 할 일이 없군요.","안락하군요.","저도 집에 가고 싶어지네요.","이제 좀 편안하네요.","본 게임은 이제부터.","숨 좀 고르죠.","캐슬링.","든든한 방패군요.","나중에 때가 오겠죠.","안전제일.","겁쟁이라고 하지 마세요.","기본입니다.","성벽 뒤로.","이제 시작입니다.","준비는 끝났습니다.","좋은 수네요.","길을 내기 위해서...","성문을 닫아야겠군요.","평화도 끝나가는군요.","살벌하셔라.","여유가 중요하죠.","다른 수를 찾아보시죠.","제 영역을 지켜야겠죠.","침착하게.","자, 들어오시죠."],
      promote:["예정된 승급입니다.","긴 여정의 마무리군요.","걸어온 길을 생각하면, 여왕이 될 자격이 있죠.","...이런 걸 보면 늘 뭉클합니다.","막으실 기회는 여러 번 있었는데, 아쉽네요.","당신껜 달갑지 않은 소식이겠군요. 미안해요, 반쯤은요.","저는 끝까지 살아남는 것들을 존중합니다.","이 승급은 이미 정해져 있었어요.","판 위에서만 허락되는 기적이죠.","여기까지 온 보람이 있네요. ...폰에게 하는 말이에요, 당신이 아니라.","이걸로 균형은 확실히 기울었군요.","작은 병사의 대관식이에요. 지켜봐 주시죠, 마지막이 될지도 모르니.","폰의 인내심이 결국 결실을 맺었습니다.","가장 소박한 존재의 화려한 변신이군요.","새로운 여왕을 맞이해 주시겠습니까.","여기까지 오느라 이 작은 폰도 꽤 피곤했을 겁니다.","판 위에서만이라도 약자가 영웅이 되길.","승급. 이로서 형세는 명확해졌군요.","마지막 선을 넘었습니다. 축하해 주셔도 좋습니다.","이 새로운 기물이 판을 평화롭게 끝내 주길 바랍니다.","축하합니다, 여왕님.","기적이군요.","좋아요, 잘 됐네요.","이런, 제가 빠르군요.","왕관을 씌우죠.","기다렸던 순간입니다.","아, 프로모션했군요.","보상이 후하네요.","이걸 못 막으시다니.","높은 자리로 올라가는 건 좋죠.","막지 못하셨군요.","노력의 결실이라고 합시다.","엔딩 크레딧이 올라갈 때가 됐군요.","조금 잔인해져도 되겠네요.","아, 황홀하군요.","호들갑 떨 일은 아니라고 생각합니다만.","승리하려면, 이 과정이 필요하죠.","수고한 폰에게.","집중하셔야 할 겁니다.","재미있어지겠네요.","어떠신가요, 버틸 만한가요?","새로운 권력이 등장했군요.","마지막 단추를 끼웠습니다.","괜히 죄송해지네요.","화려하게 가죠.","게임 체인저가 될 겁니다.","제 승부수입니다.","축배라도 들까요.","마무리 준비.","자, 행차하십니다."],
      winning:["그동안 편안하셨죠?","서두르지 않아도 됩니다. 시간은 제 편이니까요.","저는 늘 이 순간을 조심스럽게 즐깁니다.","당신에게 편한 수는 이제 없어요. 불편한 수 중에 고르셔야죠.","천천히 가겠습니다. 이긴 판을 서두르는 건 예의가 아니에요.","...제가 다 막아둬서, 죄송합니다.","이제부터는 기술의 문제예요. 그리고 저는 이 부분을 좋아합니다.","당신을 아프게 하려는 건 아니에요.","우아하게 마무리하고 싶은데, 도와주시겠어요?","당신 왕이 갈 곳이 줄어드는군요.","여기서 버티시겠다면, 얼마든지 기다려드리죠","이제 시간문제예요. 당신이 그걸 언제 받아들이느냐의 문제 말이죠.","이기는 길은 이미 결정되었습니다. 수순의 유희만 남았을 뿐이죠.","아름답게 끝을 내고 싶습니다. 너무 억지스럽지 않게요.","당신의 남은 수들을 조용히 지켜보고 있겠습니다.","포기는 부끄러운 게 아닙니다. 가끔은 현명한 선택이지요.","마지막 저항도 우아하셨으면 좋겠습니다.","이제 판 위의 정적만이 남았군요.","제 통제 하에 완전히 놓이셨습니다.","깔끔하게 정리해 드리겠습니다. 수고하셨습니다.","함정을 괜히 건드리셔서.","가엾군요.","조금 잔인한가요.","끝이 보입니다.","시간 낭비 마시죠.","제가 좀 셉니다.","심호흡이라도 하세요.","포기하시겠어요?","제 손바닥 안이네요.","비숍이 눈에 안 띄긴 하죠.","이제 즐기겠습니다.","여유가 없으시네요.","제 승리입니다.","세묜 일리치 동지라면, 아름답다고 하겠죠.","어디로 가시려고.","발버둥 치지 마시길.","마음이 무겁군요.","체념하시죠.","결말은 정해져있는 것 같은데요.","저항이 헛되네요.","왜 그러세요, 사형 선고라도 받은 것 같은 표정으로.","너무 심각하게 생각하지 마세요.","끝내드리죠.","그림이 완성되어가네요.","가시밭길뿐이네요.","제 계산이 맞군요.","미안하게 됐습니다.","편안해지실 겁니다.","마무리하겠습니다.","슬슬 끝나겠군요."],

/* ===== 착수 효과음 =====
   외부 파일 없이 Web Audio API로 짧은 필터드 노이즈 버스트를 합성해 "탁" 소리를 냄
   (완전 자립형 단일 파일 원칙 유지, §14). 오토플레이 정책 때문에 AudioContext는
   지연 생성하고, 매 호출마다 resume 시도 — 첫 호출 시점엔 이미 사용자가 모달/버튼을
   클릭한 뒤라 대부분 브라우저에서 문제없이 재생된다. */
var audioCtx=null;
function playMoveSound(){
  try{
    if(!audioCtx){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return;
      audioCtx=new AC();
    }
    if(audioCtx.state==="suspended") audioCtx.resume();
    var t=audioCtx.currentTime;
    var dur=0.05;
    var bufSize=Math.floor(audioCtx.sampleRate*dur);
    var buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++){ data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,3); }
    var noise=audioCtx.createBufferSource();
    noise.buffer=buf;
    var bp=audioCtx.createBiquadFilter();
    bp.type="bandpass"; bp.frequency.value=1600; bp.Q.value=0.7;
    var gain=audioCtx.createGain();
    gain.gain.setValueAtTime(0.45,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
    noise.connect(bp); bp.connect(gain); gain.connect(audioCtx.destination);
    noise.start(t); noise.stop(t+dur);
  }catch(e){}
}

}

/* ===== 인간처럼 두기 위한 생각 시간(1~4초 + 편차) ===== */
function humanDelay(){
  var base=1000+Math.random()*3000;      // 1~4초
  var jitter=(Math.random()-0.5)*500;    // ±250ms 편차
  return Math.min(4500, Math.max(700, base+jitter));
}

/* ===== 평가/탐색 ===== */
function stm(){ return game.turn()==="w" ? 1 : -1; }
function evaluate(){
  var b=game.board(), s=0;
  for(var r=0;r<8;r++) for(var c=0;c<8;c++){
    var sq=b[r][c]; if(!sq) continue;
    var pst = sq.color==="w" ? PST[sq.type][r][c] : PST[sq.type][7-r][c];
    s += (sq.color==="w") ? (VAL[sq.type]+pst) : -(VAL[sq.type]+pst);
  }
  return s; // 백 관점
}
function keyOf(m){
  var k=0;
  if(m.flags.indexOf("c")>=0||m.flags.indexOf("e")>=0){
    var vic=m.captured?VAL[m.captured]:100; k+=1000+vic*10-VAL[m.piece];
  }
  if(m.flags.indexOf("p")>=0) k+=900;
  return k;
}
function order(ms){ ms.sort(function(a,b){return keyOf(b)-keyOf(a);}); return ms; }

function quiesce(alpha,beta,qd){
  var standPat=stm()*evaluate();
  if(standPat>=beta) return beta;
  if(qd<=0 || Date.now()>DEADLINE){ if(Date.now()>DEADLINE) ABORT=true; return standPat>alpha?standPat:alpha; }
  if(standPat>alpha) alpha=standPat;
  if(standPat+975<alpha) return alpha;
  var caps=order(game.moves({verbose:true}).filter(function(m){
    return m.flags.indexOf("c")>=0||m.flags.indexOf("e")>=0;
  }));
  for(var i=0;i<caps.length;i++){
    var vic=caps[i].captured?VAL[caps[i].captured]:100;
    if(standPat+vic+200<alpha) continue;
    game.move(caps[i]);
    var sc=-quiesce(-beta,-alpha,qd-1);
    game.undo();
    if(sc>=beta) return beta;
    if(sc>alpha) alpha=sc;
  }
  return alpha;
}
function negamax(depth,alpha,beta,ply){
  if(Date.now()>DEADLINE){ ABORT=true; return stm()*evaluate(); }
  if(depth===0) return quiesce(alpha,beta,QUIESCE_DEPTH);
  var ms=game.moves({verbose:true});
  if(ms.length===0) return game.in_check() ? -(MATE-ply) : 0;
  order(ms);
  var best=-INF;
  for(var i=0;i<ms.length;i++){
    game.move(ms[i]);
    var sc=-negamax(depth-1,-beta,-alpha,ply+1);
    game.undo();
    if(sc>best) best=sc;
    if(best>alpha) alpha=best;
    if(alpha>=beta) break;
  }
  return best;
}

function styleBias(m,p){
  var b=0;
  var isCap=m.flags.indexOf("c")>=0||m.flags.indexOf("e")>=0;
  var isCheck=m.san.indexOf("+")>=0||m.san.indexOf("#")>=0;
  var isCastle=m.flags.indexOf("k")>=0||m.flags.indexOf("q")>=0;
  var isPromo=m.flags.indexOf("p")>=0;
  var toRank=parseInt(m.to[1],10);
  var intoEnemy = (m.color==="w") ? toRank>=5 : toRank<=4;
  if(isCap) b+=p.capBonus;
  if(isCheck) b+=p.checkBonus;
  if(isCastle) b+=p.castleBonus;
  if(isPromo) b+=30;
  if(intoEnemy && m.piece!=="p") b+=p.attackBonus;
  if(m.piece===p.favPiece){
    var fr=8-parseInt(m.from[1],10), fc=m.from.charCodeAt(0)-97;
    var tr=8-parseInt(m.to[1],10),   tc=m.to.charCodeAt(0)-97;
    var pf=(m.color==="w")?PST[m.piece][fr][fc]:PST[m.piece][7-fr][fc];
    var pt=(m.color==="w")?PST[m.piece][tr][tc]:PST[m.piece][7-tr][tc];
    if(pt>=pf) b+=p.favBonus;
  }
  if(p.earlyQueenPenalty && m.piece==="q" && game.history().length<12) b-=p.earlyQueenPenalty;
  return b;
}

function bookMove(p){
  if(Math.random()>p.bookProb) return null;
  var hist=game.history(), cands=[];
  for(var i=0;i<p.book.length;i++){
    var line=p.book[i];
    if(line.length<=hist.length) continue;
    var ok=true;
    for(var j=0;j<hist.length;j++){ if(line[j]!==hist[j]){ok=false;break;} }
    if(ok) cands.push(line[hist.length]);
  }
  if(!cands.length) return null;
  var san=cands[Math.floor(Math.random()*cands.length)];
  var legal=game.moves({verbose:true});
  for(var k=0;k<legal.length;k++){ if(legal[k].san===san) return legal[k]; }
  return null;
}

/* 한 위치의 모든 합법수를 "정적 정렬 → 윈도우 알파베타"로 평가해 base(객관적 평가) 내림차순으로
   반환. chooseMoveAsync(대국 중 착수)와 대국 분석(§evalAllMoves 재사용) 양쪽에서 공유하는 탐색
   코어 — styleBias(기풍)는 여기 섞지 않는다, 순수 객관 평가만. 이 함수 자체는 여전히 동기 함수
   그대로다: 평소엔 워커 스레드 안에서(§buildEngineWorkerSrc가 이 함수의 소스를 그대로 심음)
   돌고, 워커를 못 쓸 때만 메인 스레드에서 폴백으로 직접 호출된다. */
function evalAllMoves(depth, qd, budgetMs){
  var legal=game.moves({verbose:true});
  if(!legal.length) return [];
  ABORT=false; DEADLINE=Date.now()+budgetMs;
  var savedQD=QUIESCE_DEPTH; QUIESCE_DEPTH=qd;
  var pre=[];
  for(var i=0;i<legal.length;i++){
    game.move(legal[i]); pre.push({m:legal[i], sv:-(stm()*evaluate())}); game.undo();
  }
  pre.sort(function(a,b){return b.sv-a.sv;});
  var MARGIN=90, best=-INF, scored=[];
  for(var j=0;j<pre.length;j++){
    var mv=pre[j].m;
    game.move(mv);
    var betaChild=(best===-INF)?INF:-(best-MARGIN);
    var base=-negamax(depth-1,-INF,betaChild,1);
    game.undo();
    scored.push({m:mv, base:base});
    if(base>best) best=base;
    if(ABORT) break;
  }
  QUIESCE_DEPTH=savedQD;
  scored.sort(function(a,b){return b.base-a.base;});
  return scored;
}

/* ===== 탐색용 Web Worker =====
   evalAllMoves(위 함수)가 무거운 유일한 계산이라, 이걸 별도 스레드로 옮겨 메인 스레드(UI —
   타자기 애니메이션, 버튼, 보드)가 절대 멈추지 않게 한다. 워커 코드는 손으로 두 번 짜지 않고
   evaluate/keyOf/order/quiesce/negamax/evalAllMoves/stm 함수 소스를 Function.toString()으로
   그대로 뽑아 워커 스크립트에 심는다 — 탐색 로직은 언제나 이 파일 한 곳(위 함수들)에만 존재하고,
   워커는 그 "복사본"이 아니라 "같은 텍스트를 다른 스레드에서 실행"하는 것뿐이라 절대 따로 놀 수 없다.
   워커 생성이나 chess.js 로딩이 어떤 이유로든(구형 브라우저, 네트워크 등) 실패하면
   evalAllMovesAsync는 콜백에 null을 넘기고, 호출부(chooseMoveAsync/analysisStep)는 지금 이
   메인 스레드 evalAllMoves()로 그대로 폴백한다 — 워커가 아예 없던 이전 동작과 동일하게 동작. */
function buildEngineWorkerSrc(){
  var parts=[
    "var VAL="+JSON.stringify(VAL)+";",
    "var PST="+JSON.stringify(PST)+";",
    "var MATE="+MATE+", INF="+INF+";",
    "var CDNS="+JSON.stringify(CDNS)+";",
    "var QUIESCE_DEPTH=2, ABORT=false, DEADLINE=0, game=null;",
    "var chessLoaded=false;",
    "for(var _i=0;_i<CDNS.length && !chessLoaded;_i++){",
    "  try{ importScripts(CDNS[_i]); if(typeof Chess!=='undefined') chessLoaded=true; }catch(_e){}",
    "}",
    stm.toString()+";",
    evaluate.toString()+";",
    keyOf.toString()+";",
    order.toString()+";",
    quiesce.toString()+";",
    negamax.toString()+";",
    evalAllMoves.toString()+";",
    "onmessage=function(ev){",
    "  var d=ev.data;",
    "  if(!chessLoaded){ postMessage({type:'error',reqId:d.reqId}); return; }",
    "  try{",
    "    game=new Chess(d.fen);",
    "    var scored=evalAllMoves(d.depth,d.qd,d.budgetMs);",
    "    var out=[];",
    "    for(var i=0;i<scored.length;i++){",
    "      var mv=scored[i].m;",
    "      out.push({san:mv.san,from:mv.from,to:mv.to,promotion:mv.promotion||null,base:scored[i].base});",
    "    }",
    "    postMessage({type:'result',reqId:d.reqId,moves:out});",
    "  }catch(_err){ postMessage({type:'error',reqId:d.reqId}); }",
    "};"
  ];
  return parts.join("\n");
}
var engineWorker=null, engineWorkerReqSeq=0, engineWorkerPending={};
function getEngineWorker(){
  if(engineWorker) return engineWorker;
  var blob=new Blob([buildEngineWorkerSrc()], {type:"application/javascript"});
  engineWorker=new Worker(URL.createObjectURL(blob));
  engineWorker.onmessage=function(ev){
    var d=ev.data, cb=engineWorkerPending[d.reqId];
    delete engineWorkerPending[d.reqId];
    if(cb) cb(d.type==="result" ? d.moves : null);
  };
  engineWorker.onerror=function(){
    // 워커 자체가 죽으면(예: chess.js 로드 실패) 대기 중인 모든 요청을 폴백시키고,
    // 이 워커는 다시 쓰지 않음 — 다음 요청부터는 getEngineWorker가 새 워커를 만들어 재시도.
    for(var id in engineWorkerPending){ var cb=engineWorkerPending[id]; delete engineWorkerPending[id]; if(cb) cb(null); }
    engineWorker=null;
  };
  return engineWorker;
}
/* fen 기준 국면을 워커에서 평가. 콜백은 scored 배열({san,from,to,promotion,base}[], base 내림차순)을
   받거나, 워커를 못 쓰면 null을 받는다(호출부가 evalAllMoves()로 폴백해야 함). */
function evalAllMovesAsync(fen, depth, qd, budgetMs, cb){
  try{
    var w=getEngineWorker();
    var id=++engineWorkerReqSeq;
    engineWorkerPending[id]=cb;
    w.postMessage({reqId:id, fen:fen, depth:depth, qd:qd, budgetMs:budgetMs});
  }catch(e){
    cb(null);
  }
}

/* 손실(cp)을 CPL_THRESHOLDS 구간으로 라벨링. 메이트를 두고도 놓친 경우(mateMissed)는
   손실 수치와 무관하게 블런더로 강제. */
function classifyLoss(lossCp, mateMissed){
  if(mateMissed) return CPL_THRESHOLDS[CPL_THRESHOLDS.length-1];
  for(var i=0;i<CPL_THRESHOLDS.length;i++){ if(lossCp<=CPL_THRESHOLDS[i].max) return CPL_THRESHOLDS[i]; }
  return CPL_THRESHOLDS[CPL_THRESHOLDS.length-1];
}

/* hist(SAN 배열)가 book의 어느 라인과도 접두가 안 맞기 시작하는 첫 ply를 찾아, 그 이전
   구간(정석 구간)의 길이를 반환. bookMove()와 동일한 접두 매칭 규칙을 그대로 씀. */
function detectBookCutoff(hist, book){
  if(!book||!book.length) return 0;
  var cutoff=0;
  for(var i=0;i<hist.length;i++){
    var matched=false;
    for(var b=0;b<book.length && !matched;b++){
      var line=book[b];
      if(line.length<=i) continue;
      var ok=true;
      for(var j=0;j<=i;j++){ if(line[j]!==hist[j]){ ok=false; break; } }
      if(ok) matched=true;
    }
    if(!matched) break;
    cutoff=i+1;
  }
  return cutoff;
}

/* 봇의 실제 착수 선택 — evalAllMoves가 워커로 옮겨가면서 비동기가 됐다. 순서/로직은
   기존 chooseMove와 동일(북 → 블런더 굴림 → 탐색 → styleBias 가산 → topN 소프트맥스 추출),
   달라진 건 "탐색 결과를 어디서 기다리느냐"뿐. 워커 결과는 {san,from,to,promotion,base}만
   갖고 있어 styleBias(전체 verbose move 필요)를 적용하려면 루트의 legal 목록에서 san으로
   원본 move 객체를 다시 찾아 붙인다. 워커를 못 쓰면(콜백에 null) 지금 이 메인 스레드
   evalAllMoves()로 그대로 폴백 — 워커가 없던 이전과 결과 분포가 동일하다. */
function chooseMoveAsync(p, callback){
  var bk=bookMove(p); if(bk){ callback(bk); return; }
  var eff=effectiveParams(p);
  var legal=game.moves({verbose:true});
  if(!legal.length){ callback(null); return; }
  if(Math.random()<eff.blunder){ callback(legal[Math.floor(Math.random()*legal.length)]); return; }
  var fen=game.fen();
  evalAllMovesAsync(fen, eff.depth, 2, SEARCH_BUDGET, function(workerScored){
    try{
      var withStyle=[];
      if(workerScored){
        var bySan={}; for(var i=0;i<legal.length;i++) bySan[legal[i].san]=legal[i];
        for(var j=0;j<workerScored.length;j++){
          var full=bySan[workerScored[j].san];
          if(full) withStyle.push({m:full, total:workerScored[j].base+styleBias(full,p)});
        }
      }
      if(!withStyle.length){
        var scored=evalAllMoves(eff.depth, 2, SEARCH_BUDGET);
        for(var k=0;k<scored.length;k++) withStyle.push({m:scored[k].m, total:scored[k].base+styleBias(scored[k].m,p)});
      }
      if(!withStyle.length){ callback(legal[Math.floor(Math.random()*legal.length)]); return; }
      withStyle.sort(function(a,b){return b.total-a.total;});
      var top=withStyle.slice(0,Math.min(eff.topN,withStyle.length));
      var maxT=top[0].total, sum=0, ws=[];
      for(var t=0;t<top.length;t++){ var w=Math.exp((top[t].total-maxT)/eff.temp); ws.push(w); sum+=w; }
      var rnd=Math.random()*sum;
      for(var u=0;u<top.length;u++){ rnd-=ws[u]; if(rnd<=0){ callback(top[u].m); return; } }
      callback(top[0].m);
    }catch(e){
      callback(legal[Math.floor(Math.random()*legal.length)]);
    }
  });
}

/* ===== 대사 (타자기 효과로 한 글자씩 출력) ===== */
var typeTimer=null;
function typeInto(textEl,boxEl,text,onDone){
  if(typeTimer){ clearInterval(typeTimer); typeTimer=null; }
  var i=0; textEl.textContent="";
  typeTimer=setInterval(function(){
    i++;
    textEl.textContent=text.slice(0,i);
    boxEl.scrollTop=boxEl.scrollHeight;
    if(i>=text.length){ clearInterval(typeTimer); typeTimer=null; if(onDone) onDone(); }
  },28);
}
function speak(ctx){
  var pool=(opp.lines[ctx]&&opp.lines[ctx].length)?opp.lines[ctx]:opp.lines.normal;
  if(!pool||!pool.length) return;
  var line=pool[Math.floor(Math.random()*pool.length)];
  if(pool.length>1){ var guard=0; while(line===lastLine && guard++<6) line=pool[Math.floor(Math.random()*pool.length)]; }
  lastLine=line;
  var sp=document.getElementById("speech"); sp.classList.remove("flash"); void sp.offsetWidth; sp.classList.add("flash");
  typeInto(document.getElementById("bubble"), sp, line);
}
/* 임의 텍스트를 말풍선에 표시(대국 분석 내레이션용 — speak()와 같은 연출, 컨텍스트 룩업 없이 직접 텍스트) */
function speakText(text){
  var sp=document.getElementById("speech"); sp.classList.remove("flash"); void sp.offsetWidth; sp.classList.add("flash");
  typeInto(document.getElementById("bubble"), sp, text);
}
/* 캐릭터별 an_* 문구가 아직 없을 때의 기본 폴백(7단계) */
var AN_FALLBACK={
  book:["정석적인 수예요."], best:["최선수였어요."], great:["훌륭한 수예요."], good:["괜찮은 수예요."],
  inaccuracy:["조금 더 나은 수가 있었을 거예요."], mistake:["아쉬운 수였어요."], blunder:["이건 실수였어요."]
};
function analysisLine(o, label, bestSan){
  var pool=(o.lines["an_"+label]&&o.lines["an_"+label].length)?o.lines["an_"+label]:(AN_FALLBACK[label]||AN_FALLBACK.good);
  var line=pool[Math.floor(Math.random()*pool.length)];
  if(bestSan) line=line.replace("{best}", bestSan);
  return line;
}

/* ===== 대국 저장(localStorage) =====
   대국이 끝날 때마다 번호를 매겨 저장한다. 분석 결과는 처음 계산될 때 같은 레코드에 갱신되어
   캐시로 남는다 — "지난 대국"에서 다시 열면 캐시가 있는 한 재탐색 없이 그대로 재생. */
function nextGameId(){
  var seq=parseInt(localStorage.getItem(GAME_SEQ_KEY)||"0",10)+1;
  try{ localStorage.setItem(GAME_SEQ_KEY, String(seq)); }catch(e){}
  return seq;
}
function loadGameList(){
  try{ return JSON.parse(localStorage.getItem(GAME_STORE_KEY)||"[]"); }catch(e){ return []; }
}
function saveGameList(list){
  if(list.length>GAME_STORE_CAP) list=list.slice(list.length-GAME_STORE_CAP);
  try{ localStorage.setItem(GAME_STORE_KEY, JSON.stringify(list)); }catch(e){}
}
function loadGameRecord(id){
  var list=loadGameList();
  for(var i=0;i<list.length;i++){ if(list[i].id===id) return list[i]; }
  return null;
}
function saveGameRecord(forced){
  var id=nextGameId(), resultDetail, result;
  if(forced){ result=forced.result; resultDetail=forced.resultDetail; }
  else if(game.in_checkmate()){ resultDetail="checkmate"; result=(game.turn()===playerColor)?"loss":"win"; }
  else if(game.in_stalemate()){ resultDetail="stalemate"; result="draw"; }
  else if(game.insufficient_material()){ resultDetail="insufficient"; result="draw"; }
  else if(game.in_threefold_repetition()){ resultDetail="repetition"; result="draw"; }
  else if(game.in_draw()){ resultDetail="fifty"; result="draw"; }
  else { resultDetail="unknown"; result="unknown"; }
  var rec={
    id:id, date:new Date().toISOString(),
    opponentId:opp.id, opponentName:opp.name, opponentRating:opp.rating,
    playerColor:playerColor, difficulty:difficulty,
    result:result, resultDetail:resultDetail,
    moves:game.history(), analysis:null
  };
  var list=loadGameList(); list.push(rec); saveGameList(list);
  return id;
}
function stripForStorage(results){
  return results.map(function(r){
    return {ply:r.ply, moveNumber:r.moveNumber, color:r.color, san:r.san,
            bestSan:r.bestSan, lossCp:r.lossCp, label:r.label, symbol:r.symbol};
  });
}
function updateGameAnalysis(id, data){
  var list=loadGameList();
  for(var i=0;i<list.length;i++){ if(list[i].id===id){ list[i].analysis=data; break; } }
  saveGameList(list);
}
/* 저장된 moves(SAN)만으로 각 ply의 fenAfter/lastMove를 다시 만들어 붙인다(복기 모드 보드 동기화용
   — 이 필드들은 용량 절약을 위해 localStorage엔 저장하지 않음, §review.md §9/§15). */
function hydrateFenForResults(results, moves){
  game.reset();
  for(var i=0;i<moves.length && i<results.length;i++){
    game.move(moves[i]);
    results[i].fenAfter=game.fen();
    var vh=game.history({verbose:true}), lm=vh[vh.length-1];
    results[i].lastMove={from:lm.from,to:lm.to};
  }
}

/* ===== 대국 분석 — 계산 단계 =====
   챗 종료 후, 각 위치에서 evalAllMoves로 "최선수 대비 실제 둔 수의 손실"을 구한다. 정석 구간은
   탐색을 생략(§detectBookCutoff). styleBias는 섞지 않음 — 객관적 최선수 기준. */
function accuracyFromLoss(lossCp){
  var a=103.1668*Math.exp(-0.04354*lossCp)-3.1669;
  return Math.max(0,Math.min(100,a));
}
function buildSummary(results){
  var acc={w:{sum:0,n:0,book:0,best:0,great:0,good:0,inaccuracy:0,mistake:0,blunder:0},
           b:{sum:0,n:0,book:0,best:0,great:0,good:0,inaccuracy:0,mistake:0,blunder:0}};
  for(var i=0;i<results.length;i++){
    var r=results[i], side=acc[r.color];
    side[r.label]=(side[r.label]||0)+1;
    if(r.label!=="book"){ side.sum+=accuracyFromLoss(r.lossCp); side.n++; }
  }
  function fin(s){
    return {accuracy: s.n? Math.round((s.sum/s.n)*10)/10 : 100,
      book:s.book,best:s.best,great:s.great,good:s.good,inaccuracy:s.inaccuracy,mistake:s.mistake,blunder:s.blunder};
  }
  var worst=results.filter(function(r){return r.label!=="book";})
    .slice().sort(function(a,b){return (b.lossCp||0)-(a.lossCp||0);}).slice(0,5);
  return {white:fin(acc.w), black:fin(acc.b), worstMoves:worst};
}
function speakAnalysisWait(){
  var pool=(opp.lines.an_wait&&opp.lines.an_wait.length)?opp.lines.an_wait:["검토 중입니다…"];
  speakText(pool[Math.floor(Math.random()*pool.length)]);
}
function startAnalysis(){
  if(analyzing || !gameOver || !game || game.history().length===0) return;
  if(lastAnalysis && lastAnalysis.gameId===currentGameId){ enterReview(lastAnalysis); return; }
  lastAnalysis=null;
  origHist=game.history({verbose:true});
  analysisBookCutoff=detectBookCutoff(game.history(), opp.book);
  analysisResults=[];
  analyzing=true; analysisAbort=false; analysisReady=false; pendingAnalysisPayload=null;
  renderPostGameBar();
  var nonBookMoves=origHist.length-analysisBookCutoff;
  var hasChatData=opp.chat && opp.chat.topicSets && opp.chat.topicSets.main && opp.chat.topicSets.main.length;
  if(hasChatData && nonBookMoves>=CHAT_MIN_NONBOOK_MOVES) startAnalysisChat();
  else speakAnalysisWait();
  game.reset();
  setTimeout(function(){ analysisStep(0); }, 15);
}
function cancelAnalysis(){
  analysisAbort=true;
  if(chatActive) closeChatOverlay();
}
/* 정석 구간(book)이 아닌 매 ply마다 evalAllMoves를 워커에서 돌린다(§buildEngineWorkerSrc) —
   메인 스레드는 그동안 잡담 오버레이(§chat.md)의 타이핑/버튼을 그대로 처리할 수 있다. 워커가
   없으면(콜백 scored===null) 이 자리에서 메인 스레드 evalAllMoves()로 즉시 폴백 — 그 경우
   그 한 수만큼은 예전처럼 메인 스레드가 잠깐 멈추지만, 결과와 판정 로직은 동일하다. */
function analysisStep(i){
  if(analysisAbort){
    for(var k=i;k<origHist.length;k++) game.move(origHist[k].san);
    analyzing=false; renderPostGameBar();
    return;
  }
  if(i>=origHist.length){ finishAnalysis(); return; }
  var entry=origHist[i];
  if(i<analysisBookCutoff){
    analysisStepFinish(i, entry, {ply:i, moveNumber:Math.floor(i/2)+1, color:entry.color, san:entry.san,
      bestSan:null, lossCp:null, label:"book", symbol:"⚑"});
    return;
  }
  var fen=game.fen();
  evalAllMovesAsync(fen, ANALYSIS_DEPTH, ANALYSIS_QD, ANALYSIS_BUDGET_PER_MOVE, function(scored){
    if(!scored){
      var full=evalAllMoves(ANALYSIS_DEPTH, ANALYSIS_QD, ANALYSIS_BUDGET_PER_MOVE);
      scored=full.map(function(s){ return {san:s.m.san, base:s.base}; });
    }
    var bestEntry=scored.length?scored[0]:null, actualEntry=null;
    for(var s=0;s<scored.length;s++){ if(scored[s].san===entry.san){ actualEntry=scored[s]; break; } }
    var result;
    if(!bestEntry || !actualEntry){
      result={ply:i, moveNumber:Math.floor(i/2)+1, color:entry.color, san:entry.san,
               bestSan:null, lossCp:0, label:"good", symbol:""};
    } else {
      var CLAMP=1000;
      var bestClamped=Math.max(-CLAMP,Math.min(CLAMP,bestEntry.base));
      var actualClamped=Math.max(-CLAMP,Math.min(CLAMP,actualEntry.base));
      var lossCp=Math.max(0, bestClamped-actualClamped);
      var mateMissed = bestEntry.base>=MATE-100 && actualEntry.base<MATE-100;
      var tier=classifyLoss(lossCp, mateMissed);
      result={ply:i, moveNumber:Math.floor(i/2)+1, color:entry.color, san:entry.san,
               bestSan:bestEntry.san, lossCp:lossCp, label:tier.label, symbol:tier.symbol};
    }
    analysisStepFinish(i, entry, result);
  });
}
function analysisStepFinish(i, entry, result){
  game.move(entry.san);
  result.fenAfter=game.fen();
  result.lastMove={from:entry.from,to:entry.to};
  analysisResults.push(result);
  renderPostGameBar();
  setTimeout(function(){ analysisStep(i+1); }, 0);
}
function finishAnalysis(){
  analyzing=false;
  analysisReady=true;
  pendingAnalysisPayload={summary:buildSummary(analysisResults)};
  if(!chatActive) revealAnalysisResults();
  // chatActive면 여기서 화면을 넘기지 않음 — 진행 중인 잡담 사이클을 마친 뒤
  // closeAnalysisChat()이 적절한 시점에 revealAnalysisResults()를 부른다(§chat.md 5).
}
function revealAnalysisResults(){
  var summary=pendingAnalysisPayload.summary;
  updateGameAnalysis(currentGameId, {results:stripForStorage(analysisResults), summary:summary});
  enterReview({gameId:currentGameId, results:analysisResults, summary:summary});
}

/* ===== 대국 분석 대기 중 잡담(§chat.md) =====
   인터뷰(startInterview)와 같은 #vnScrim 오버레이를 재사용하되, 상태는 완전히 분리
   (interviewActive를 재사용하지 않음 — chatActive로 별도 관리). 계산(analysisStep)은
   이 오버레이가 무엇을 보여주든 상관없이 항상 백그라운드에서 최대 속도로 계속 진행되고,
   유일한 결합 지점은 analysisReady 플래그뿐. 화제는 CHARACTERS[i].chat.topicSets라는
   이름 붙은 세트들의 그래프로 되어 있어(§chat.md 6), 화제를 늘릴 땐 이 함수들을 건드릴
   필요 없이 데이터(topicSets)에 항목만 추가하면 된다. */
function chatTopicLabel(entry){
  if(entry.label) return entry.label;
  if(entry.refId){
    for(var i=0;i<CHARACTERS.length;i++){ if(CHARACTERS[i].id===entry.refId) return CHARACTERS[i].name+"에 대해"; }
  }
  return "그에 대해";
}
function startAnalysisChat(){
  chatActive=true; chatTopicStack=[]; chatCurrentSet="main"; chatExchangeCount=0;
  document.getElementById("menuBtn").disabled=true;
  document.getElementById("board").classList.add("board-dim");
  document.getElementById("vnPortrait").src=opp.imgB;
  document.getElementById("vnPortrait").alt=opp.name;
  document.getElementById("vnName").textContent=opp.name;
  document.getElementById("vnScrim").classList.add("show");
  var openingPool=opp.chat.opening;
  var opening=openingPool[Math.floor(Math.random()*openingPool.length)];
  playSentenceQueue(opening, function(){ renderChatTopics("main"); });
}
function renderChatTopics(setKey){
  chatCurrentSet=setKey;
  var promptPool=(opp.chat.prompt&&opp.chat.prompt.length)?opp.chat.prompt:["궁금한 것이 있나요?"];
  typeInto(document.getElementById("vnBubble"), document.getElementById("vnText"),
    promptPool[Math.floor(Math.random()*promptPool.length)]);
  renderChatTopicPage(0);
}
/* 화제 목록을 CHAT_PAGE_SIZE개씩 나눠 보여줌 — 세트 하나에 항목이 많아도(§chat.md) 선택창이
   길게 늘어나지 않도록 "다른 화제..."로 페이지만 순환(마지막 페이지 다음은 다시 처음으로). */
function renderChatTopicPage(page){
  var set=opp.chat.topicSets[chatCurrentSet]||[];
  var totalPages=Math.max(1, Math.ceil(set.length/CHAT_PAGE_SIZE));
  page=((page%totalPages)+totalPages)%totalPages;
  var wrap=document.getElementById("vnChoices"); wrap.innerHTML="";
  set.slice(page*CHAT_PAGE_SIZE, page*CHAT_PAGE_SIZE+CHAT_PAGE_SIZE).forEach(function(entry){
    var btn=document.createElement("button");
    btn.textContent = entry.type==="more" ? entry.label : chatTopicLabel(entry);
    btn.onclick=function(){ selectChatTopic(entry); };
    wrap.appendChild(btn);
  });
  if(totalPages>1){
    var more=document.createElement("button");
    more.className="skipBtn"; more.textContent="다른 화제...";
    more.onclick=function(){ renderChatTopicPage(page+1); };
    wrap.appendChild(more);
  }
  if(chatTopicStack.length){
    var back=document.createElement("button");
    back.className="skipBtn"; back.textContent="◂ 돌아가기";
    back.onclick=function(){ renderChatTopics(chatTopicStack.pop()); };
    wrap.appendChild(back);
  }
}
function selectChatTopic(entry){
  if(entry.type==="more"){ chatTopicStack.push(chatCurrentSet); renderChatTopics(entry.target); }
  else renderChatSubs(entry, 0);
}
function renderChatSubs(entry, page){
  var subs=entry.subs;
  var totalPages=Math.max(1, Math.ceil(subs.length/CHAT_PAGE_SIZE));
  page=((page%totalPages)+totalPages)%totalPages;
  var wrap=document.getElementById("vnChoices"); wrap.innerHTML="";
  subs.slice(page*CHAT_PAGE_SIZE, page*CHAT_PAGE_SIZE+CHAT_PAGE_SIZE).forEach(function(sub){
    var btn=document.createElement("button");
    btn.textContent=sub.q;
    btn.onclick=function(){ selectChatSub(sub); };
    wrap.appendChild(btn);
  });
  if(totalPages>1){
    var more=document.createElement("button");
    more.className="skipBtn"; more.textContent="다른 질문...";
    more.onclick=function(){ renderChatSubs(entry, page+1); };
    wrap.appendChild(more);
  }
  var back=document.createElement("button");
  back.className="skipBtn"; back.textContent="◂ 돌아가기";
  back.onclick=function(){ renderChatTopics(chatCurrentSet); };
  wrap.appendChild(back);
}
function selectChatSub(sub){
  chatExchangeCount++;
  var variants=sub.a;
  var variant=variants[Math.floor(Math.random()*variants.length)];
  if(variants.length>1){
    var guard=0;
    while(variant===sub._last && guard++<6) variant=variants[Math.floor(Math.random()*variants.length)];
  }
  sub._last=variant;
  playSentenceQueue(variant, function(){
    if(analysisReady && chatExchangeCount>=1) closeAnalysisChat();
    else renderChatTopics(chatCurrentSet);
  });
}
/* 오프닝/답변/마무리 인사 공용 — 문장을 하나씩 typeInto로 보여주고, 화면 아무 곳이나 탭하면 전진
   (chatSentenceMode가 true인 동안 vnScrim 클릭 리스너가 advanceChatSentence를 부름).
   타이핑 중에 탭하면 그 문장을 즉시 완성(흔한 VN 관례), 다 끝난 뒤 탭하면 다음 문장으로.
   타이핑이 끝나면 모서리의 역삼각형(#vnNext)이 떠서 "탭하면 다음"임을 알려준다. */
function playSentenceQueue(sentences, onDone){
  chatQueue=sentences; chatQueueIndex=0; chatOnQueueDone=onDone;
  chatSentenceMode=true;
  renderChatSentence();
}
function renderChatSentence(){
  document.getElementById("vnChoices").innerHTML="";
  document.getElementById("vnNext").classList.remove("show");
  typeInto(document.getElementById("vnBubble"), document.getElementById("vnText"), chatQueue[chatQueueIndex], function(){
    document.getElementById("vnNext").classList.add("show");
  });
}
function advanceChatSentence(){
  if(typeTimer){
    clearInterval(typeTimer); typeTimer=null;
    document.getElementById("vnBubble").textContent=chatQueue[chatQueueIndex];
    document.getElementById("vnNext").classList.add("show");
    return;
  }
  chatQueueIndex++;
  if(chatQueueIndex>=chatQueue.length){
    chatSentenceMode=false;
    document.getElementById("vnNext").classList.remove("show");
    var done=chatOnQueueDone; chatOnQueueDone=null;
    if(done) done();
    return;
  }
  renderChatSentence();
}
function closeAnalysisChat(){
  var closingPool=opp.chat.closing;
  var closing=closingPool[Math.floor(Math.random()*closingPool.length)];
  playSentenceQueue(closing, function(){
    closeChatOverlay();
    revealAnalysisResults();
  });
}
function closeChatOverlay(){
  chatActive=false;
  chatSentenceMode=false;
  document.getElementById("vnNext").classList.remove("show");
  if(typeTimer){ clearInterval(typeTimer); typeTimer=null; }
  document.getElementById("menuBtn").disabled=false;
  document.getElementById("board").classList.remove("board-dim");
  document.getElementById("vnScrim").classList.remove("show");
  document.getElementById("vnChoices").innerHTML="";
}
/* 잡담 문장 재생 중(chatSentenceMode)엔 화면 어디를 눌러도 다음 문장으로 전진 — 화제/질문
   선택 버튼이 떠 있는 동안은 chatSentenceMode가 false라 이 리스너가 아무 일도 하지 않으므로
   버튼 클릭과 충돌하지 않는다. 단, 화제/질문 버튼을 누른 그 클릭 자체는(예: selectChatSub가
   playSentenceQueue를 불러 chatSentenceMode를 true로 바꾼 뒤) 같은 이벤트가 그대로 vnScrim까지
   버블링되므로, 버튼(또는 그 자손)에서 시작된 클릭은 무시해서 "누르자마자 첫 글자가 다
   나오는" 것을 막는다. */
document.getElementById("vnScrim").addEventListener("click", function(e){
  if(e.target.closest && e.target.closest("button")) return;
  if(chatSentenceMode) advanceChatSentence();
});

/* ===== 대국 분석 — 복기(리뷰) 단계 =====
   화살표로 ply를 자유롭게 오가며 그 수의 코멘트를 보고 보드도 그 시점 위치로 전환.
   reviewGameSnapshot이 있으면 "지난 대국"을 보고 있는 것 — 닫을 때 원래 라이브 상태로 복원. */
function enterReview(analysis){
  lastAnalysis=analysis;
  reviewIndex=analysis.results.length?0:-1;
  renderAnalysisSummary(analysis.summary);
  renderMoveLog();
  if(reviewIndex>=0){
    document.getElementById("status").style.display="none"; // 복기 중엔 "당신 차례입니다" 류 상태줄을 숨김
    gotoPly(reviewIndex);
  } else renderPostGameBar();
}
function gotoPly(i){
  if(!lastAnalysis) return;
  var results=lastAnalysis.results;
  if(i<0||i>=results.length) return;
  reviewIndex=i;
  var r=results[i];
  if(r.fenAfter) game.load(r.fenAfter);
  lastMove=r.lastMove||null;
  render();
  speakText(analysisLine(opp, r.label, r.bestSan));
  renderPostGameBar();
  renderMoveLog();
  setSheetExpanded(false); // 수를 고르면 시트를 접어 체스판이 바로 보이게(오버레이 목적 그대로)
}
function exitReview(){
  reviewIndex=-1;
  if(reviewGameSnapshot){
    game.reset();
    for(var i=0;i<reviewGameSnapshot.moves.length;i++) game.move(reviewGameSnapshot.moves[i]);
    lastAnalysis=reviewGameSnapshot.lastAnalysis;
    currentGameId=reviewGameSnapshot.currentGameId;
    gameOver=reviewGameSnapshot.gameOver;
    reviewGameSnapshot=null;
  } else {
    game.reset();
    for(var j=0;j<origHist.length;j++) game.move(origHist[j].san);
  }
  lastMove=null;
  document.getElementById("status").style.display=""; // 복기 종료 — 상태줄 복원
  render();
  renderPostGameBar();
  renderAnalysisSummary(lastAnalysis?lastAnalysis.summary:null);
  renderMoveLog();
}
function openPastGame(id){
  if(analyzing || (!gameOver && game && game.history().length>0)) return;
  var rec=loadGameRecord(id);
  if(!rec) return;
  closeMenu();
  reviewGameSnapshot={moves:game.history(), lastAnalysis:lastAnalysis, currentGameId:currentGameId, gameOver:gameOver};
  game.reset();
  for(var i=0;i<rec.moves.length;i++) game.move(rec.moves[i]);
  gameOver=true; currentGameId=id;
  if(rec.analysis){
    var analysis={gameId:id, results:rec.analysis.results, summary:rec.analysis.summary};
    hydrateFenForResults(analysis.results, rec.moves);
    enterReview(analysis);
  } else {
    lastAnalysis=null;
    render(); renderPostGameBar(); renderMoveLog();
    startAnalysis();
  }
}

/* ===== 대국 분석 — 렌더링 =====
   #sheetControls는 하단 시트의 그립 바로 아래, 접혀있을 때도 항상 보이는 행(§--sheetPeek).
   상태(분석 중/복기 중/분석 가능/그냥 진행 중/기보 없음)에 따라 내용만 바뀔 뿐, 시트 자체의
   펼침 여부와는 무관 — 시트가 접혀 있어도 이 행만은 늘 노출된다. */
function renderPostGameBar(){
  var bar=document.getElementById("sheetControls");
  var topBar=document.getElementById("analysisTopBar");
  if(!bar) return;
  if(analyzing){
    var pct=origHist.length?Math.round((analysisResults.length/origHist.length)*100):0;
    bar.innerHTML=
      '<div class="pgbProgress"><div class="pgbProgressFill" style="width:'+pct+'%"></div></div>'+
      '<div class="pgbProgressText">검토 중… ('+analysisResults.length+'/'+origHist.length+')</div>'+
      '<button class="pgbCancel" onclick="cancelAnalysis()">취소</button>';
    if(topBar){
      topBar.classList.add("show");
      document.getElementById("atbFill").style.width=pct+"%";
      document.getElementById("atbText").textContent="대국 검토 중… ("+analysisResults.length+"/"+origHist.length+")";
    }
  } else {
    if(topBar) topBar.classList.remove("show");
    if(reviewIndex>=0 && lastAnalysis){
      var r=lastAnalysis.results[reviewIndex];
      var tierText = r.label==="book" ? "정석" : ((CPL_THRESHOLDS.filter(function(t){return t.label===r.label;})[0]||{}).text||"");
      bar.innerHTML=
        '<button class="navArrow" '+(reviewIndex<=0?'disabled':'')+' onclick="gotoPly(reviewIndex-1)">◀</button>'+
        '<div class="navInfo">'+r.moveNumber+'수 · '+(r.color==="w"?"백":"흑")+' · '+(r.symbol||'')+' '+tierText+'</div>'+
        '<button class="navArrow" '+(reviewIndex>=lastAnalysis.results.length-1?'disabled':'')+' onclick="gotoPly(reviewIndex+1)">▶</button>'+
        '<button class="navClose" onclick="exitReview()">✕</button>';
    } else if(gameOver && game && game.history().length>0){
      var hasCache=lastAnalysis && lastAnalysis.gameId===currentGameId;
      bar.innerHTML='<button class="pgbBtn" onclick="startAnalysis()">'+(hasCache?"복기 보기":"대국 분석")+'</button>';
    } else if(game && game.history().length>0){
      var h=game.history();
      bar.innerHTML='<div class="sheetIdleInfo">기보 <b>'+h.length+'수</b> · 위로 스와이프해 보기</div>';
    } else {
      bar.innerHTML='<div class="sheetIdleInfo">기보 없음</div>';
    }
  }
}
function renderAnalysisSummary(summary){
  var el=document.getElementById("analysisSummary");
  if(!el) return;
  if(!summary){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="block";
  var html='<div class="asAcc"><span>백 정확도 <b>'+summary.white.accuracy+'%</b></span><span>흑 정확도 <b>'+summary.black.accuracy+'%</b></span></div>';
  if(summary.worstMoves && summary.worstMoves.length){
    html+='<div class="asWorstLbl">최악의 수</div>';
    summary.worstMoves.forEach(function(m){
      html+='<div class="asWorstItem" onclick="gotoPly('+m.ply+')">'+m.moveNumber+'수 '+(m.color==="w"?"백":"흑")+' '+m.san+
        ' <span class="mlTag t-'+m.label+'">'+(m.symbol||'')+'</span></div>';
    });
  }
  el.innerHTML=html;
}
function renderPastGamesList(){
